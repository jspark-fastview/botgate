server.port=3001
spring.application.name=internal-api

# DataSource — admin-api 와 동일 DB 공유. 기본 SQLite, K8s 는 env 로 Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:/app/data/botgate.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# HikariCP — SQLite 1 / Postgres 10 (env override)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:1}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.max-lifetime=1800000

# Flyway 는 admin-api 만 실행 — internal-api 는 schema 만 읽음
spring.flyway.enabled=false

# Actuator + Prometheus 메트릭
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=internal-api
