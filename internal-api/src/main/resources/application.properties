server.port=3001
spring.application.name=internal-api

# SQLite (현재) — RDS 전환 시 교체
spring.datasource.url=jdbc:sqlite:/app/data/botgate.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite write 직렬화 — pool size 1
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1

# Actuator + Prometheus 메트릭
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=internal-api
