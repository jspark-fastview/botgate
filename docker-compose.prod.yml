services:
  openresty:
    image: openresty/openresty:1.25.3.2-alpine
    ports:
      - "80:80"          # 봇 트래픽 (표준 HTTP)
    environment:
      - TOKEN_API_HOST=token-api
      - TOKEN_API_PORT=3000
      - BOTGATE_BYPASS_KEY=${BOTGATE_BYPASS_KEY:-}
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/conf.d/dev:/etc/nginx/conf.d:ro
      - ./openresty/lua:/etc/nginx/lua:ro
    depends_on:
      - token-api
    restart: always

  token-api:
    build: ./token-api
    ports:
      - "3000:3000"      # ALB → botgate-admin.viewus.co 라우팅용
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
      - STATS_KEY=${STATS_KEY:-}      # innerops 등 외부 모니터링용 read-only 키
      - OPENRESTY_HOST=openresty
      - OPENRESTY_PORT=80
      - ALB_HOSTNAME=${ALB_HOSTNAME:-}
    volumes:
      - token-data:/app/data
      - ./web:/app/web:ro
    restart: always

  internal-api:
    build: ./internal-api
    ports:
      - "3001:3001"
    volumes:
      - token-data:/app/data
    restart: always

  admin-api:
    build: ./admin-api
    ports:
      - "3002:3002"
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
      - STATS_KEY=${STATS_KEY:-}
    volumes:
      - token-data:/app/data
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3003:3003"
    restart: always

volumes:
  token-data:
