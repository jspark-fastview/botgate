services:
  openresty:
    image: openresty/openresty:1.25.3.2-alpine
    ports:
      - "80:80"          # 봇 트래픽 (표준 HTTP)
    environment:
      - TOKEN_API_HOST=token-api
      - TOKEN_API_PORT=3000
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/conf.d/dev:/etc/nginx/conf.d:ro
      - ./openresty/lua:/etc/nginx/lua:ro
    depends_on:
      - token-api
    restart: always

  token-api:
    build: ./token-api
    expose:
      - "3000"           # 외부 노출 없음 — SSH 터널로만 접근
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
      - OPENRESTY_HOST=openresty
      - OPENRESTY_PORT=80
    volumes:
      - token-data:/app/data
      - ./web:/app/web:ro
    restart: always

volumes:
  token-data:
