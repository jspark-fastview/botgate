services:
  openresty:
    build: ./openresty
    ports:
      - "80:80"          # 봇 트래픽 (표준 HTTP)
    environment:
      - INTERNAL_API_HOST=internal-api   # guardus-new 스택 (botgate_default 네트워크 공유)
      - INTERNAL_API_PORT=3001
      - ADMIN_API_HOST=admin-api         # guardus-new 스택 (botgate_default 네트워크 공유)
      - ADMIN_API_PORT=3002
      - BOTGATE_BYPASS_KEY=${BOTGATE_BYPASS_KEY:-}
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/conf.d/dev:/etc/nginx/conf.d:ro
      - ./openresty/lua:/etc/nginx/lua:ro
    restart: always
