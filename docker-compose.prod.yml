services:
  openresty:
    image: openresty/openresty:1.25.3.2-alpine
    ports:
      - "80:80"
    environment:
      - TOKEN_API_HOST=token-api
      - TOKEN_API_PORT=3000
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/conf.d/prod:/etc/nginx/conf.d:ro
      - ./openresty/lua:/etc/nginx/lua:ro
    depends_on:
      - token-api
    restart: always

  token-api:
    build: ./token-api
    volumes:
      - token-data:/app/data
    restart: always

volumes:
  token-data:
