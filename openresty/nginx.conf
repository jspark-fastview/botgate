worker_processes auto;
error_log /dev/stderr warn;

env TOKEN_API_HOST;
env TOKEN_API_PORT;
env BOTGATE_BYPASS_KEY;
env ADMIN_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # shared dict for rDNS cache (1m ≈ ~8000 entries)
    lua_shared_dict rdns_cache 1m;
    # shared dict for dynamic bot catalog (fetched from token-api every 5 min)
    lua_shared_dict bot_catalog 512k;

    init_worker_by_lua_block {
        local function refresh_catalog()
            local http = require "resty.http"
            local host = os.getenv("TOKEN_API_HOST") or "localhost"
            local port = os.getenv("TOKEN_API_PORT") or "3000"
            local httpc = http.new()
            httpc:set_timeout(5000)
            local res, err = httpc:request_uri(
                "http://" .. host .. ":" .. port .. "/internal/bot-catalog",
                { method = "GET" }
            )
            if res and res.status == 200 and res.body then
                ngx.shared.bot_catalog:set("json",    res.body)
                ngx.shared.bot_catalog:set("version", ngx.now())
            end
            httpc:close()
        end
        -- 워커 0만 fetch (공유 dict에 저장, 모든 워커가 읽음)
        if ngx.worker.id() == 0 then
            ngx.timer.at(1, function() refresh_catalog() end)
            ngx.timer.every(300, function() refresh_catalog() end)
        end
    }

    # Docker 내부 DNS (cosocket hostname 해석용)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # lua module search path
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/nginx/lua/?.lua;;";

    # JSON access log
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"host":"$host",'
        '"ua":"$http_user_agent",'
        '"ref":"$http_referer",'
        '"x_bot_verified":"$http_x_bot_verified"'
        '}';

    access_log /dev/stdout json_combined;

    include /etc/nginx/conf.d/*.conf;
}
