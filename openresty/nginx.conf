worker_processes auto;
error_log /dev/stderr warn;

env TOKEN_API_HOST;
env TOKEN_API_PORT;
env INTERNAL_API_HOST;
env INTERNAL_API_PORT;
env ADMIN_API_HOST;
env ADMIN_API_PORT;
env BOTGATE_BYPASS_KEY;
env ADMIN_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 업로드 본문 크기 — 기본 1MB 초과 시 413. WordPress 미디어 업로드 등 대응.
    # 20m: 일반적인 이미지 + RAW 일부 + 짧은 동영상까지 커버.
    client_max_body_size 20m;
    client_body_buffer_size 256k;

    # ── Loki 용 JSON access log ────────────────────────────────────────
    # log_by_lua 가 ngx.ctx 의 분류 결과 → ngx.var 로 노출
    # escape=json — 특수문자 안전. Alloy 가 stdout 에서 자동 파싱.
    log_format guardus_json escape=json
      '{'
        '"ts":"$time_iso8601",'
        '"host":"$host",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt":$request_time,'
        '"ua":"$http_user_agent",'
        '"bot_name":"$bot_name",'
        '"bot_vendor":"$bot_vendor",'
        '"bot_purpose":"$bot_purpose",'
        '"category":"$bot_category",'
        '"action":"$bot_action",'
        '"verified":"$bot_verified_log",'
        '"billed":"$bot_billed",'
        '"blocked":"$bot_blocked"'
      '}';

    # shared dict for rDNS cache (10m ≈ ~80k entries) — 100× 트래픽 대비 확대
    lua_shared_dict rdns_cache 10m;
    # shared dict for dynamic bot catalog
    lua_shared_dict bot_catalog 512k;
    # shared dict for prometheus metrics
    lua_shared_dict prometheus_metrics 10M;
    # shared dict for token validation cache (5 min TTL, ~30k entries)
    lua_shared_dict token_cache 4m;
    # 공식 봇 IP 범위 (Googlebot/GPTBot/Bingbot 등 — JSON CDR 사전 수집)
    lua_shared_dict bot_ip_ranges 4m;

    init_worker_by_lua_block {
        -- Prometheus 메트릭 (worker 시작 시 1회 등록)
        prometheus = require("prometheus").init("prometheus_metrics")
        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Number of HTTP requests",
            {"host", "status", "bot_verified"})
        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "HTTP request latency",
            {"host"})
        metric_bytes = prometheus:counter(
            "nginx_http_response_size_bytes",
            "Total bytes sent",
            {"host"})
        metric_connections = prometheus:gauge(
            "nginx_http_connections",
            "Number of HTTP connections",
            {"state"})

        local cjson_safe = require "cjson.safe"
        local host = os.getenv("INTERNAL_API_HOST") or os.getenv("TOKEN_API_HOST") or "localhost"
        local port = os.getenv("INTERNAL_API_PORT") or os.getenv("TOKEN_API_PORT") or "3000"
        local base = "http://" .. host .. ":" .. port

        local function fetch(path, timeout)
            local http  = require "resty.http"
            local httpc = http.new()
            httpc:set_timeout(timeout or 5000)
            local res, err = httpc:request_uri(base .. path, { method = "GET" })
            httpc:close()
            return res
        end

        -- 봇 카탈로그 5분마다 갱신
        local function refresh_catalog()
            local res = fetch("/internal/bot-catalog", 5000)
            if res and res.status == 200 and res.body then
                ngx.shared.bot_catalog:set("json",    res.body)
                ngx.shared.bot_catalog:set("version", ngx.now())
            end
        end

        -- 긴급 바이패스 10초마다 폴링
        local function refresh_bypass()
            local res = fetch("/internal/bypass", 2000)
            if res and res.status == 200 and res.body then
                local d = cjson_safe.decode(res.body)
                ngx.shared.bot_catalog:set("bypass", (d and d.bypass) and "1" or "0")
            end
        end

        -- 봇 IP 범위 1시간마다 갱신 (공식 publish JSON 수집)
        local function refresh_bot_ips()
            local ok, mod = pcall(require, "bot_ip_verifier")
            if ok and mod and mod.refresh_all then
                pcall(mod.refresh_all)
            end
        end

        -- channels/path_rules/policies 백그라운드 prefetch
        -- 첫 요청 기다리지 말고 시작 직후 캐시 채움 → cold start 시 no_channel 방지
        local function prefetch_admin_data()
            local ok, err = pcall(function()
                -- 이전 시도에서 negative 캐시 박혔을 수 있으니 invalidate 후 warm
                require("channels").invalidate()
                require("path_rules").invalidate()
                require("purpose_policies").invalidate()
                require("settings").invalidate()
                local c = require("channels").warm()
                local r = require("path_rules").warm()
                local p = require("purpose_policies").warm()
                local s = require("settings").warm()
                ngx.log(ngx.WARN, "[prefetch] channels=", #(c or {}),
                                  " path_rules=", #(r or {}),
                                  " policies=", (p and next(p) and "loaded" or "miss"),
                                  " settings=", (s and next(s) and "loaded" or "miss"))
            end)
            if not ok then ngx.log(ngx.ERR, "[prefetch] failed: ", err) end
        end

        -- 워커 0만 fetch (공유 dict에 저장, 모든 워커가 읽음)
        if ngx.worker.id() == 0 then
            ngx.timer.at(1,   function() refresh_catalog() end)
            ngx.timer.at(1,   function() refresh_bypass()  end)
            ngx.timer.at(2,   function() refresh_bot_ips() end)
            -- admin-api 부팅 대기 후 prefetch (15s, 30s, 60s 재시도 — 점진적 backoff)
            ngx.timer.at(15,  function() prefetch_admin_data() end)
            ngx.timer.at(30,  function() prefetch_admin_data() end)
            ngx.timer.at(60,  function() prefetch_admin_data() end)
            ngx.timer.every(300,  function() refresh_catalog() end)
            ngx.timer.every(10,   function() refresh_bypass()  end)
            ngx.timer.every(3600, function() refresh_bot_ips() end)
        end
    }

    # DNS resolver (cosocket hostname 해석용)
    # 127.0.0.11 = Docker embedded DNS (EC2 환경)
    # 10.100.0.10 = K8s CoreDNS cluster IP
    # 둘 다 명시 — 한쪽 실패해도 다른 쪽 시도. ipv6=off 로 AAAA 조회 제거 (timeout 줄임).
    resolver 127.0.0.11 10.100.0.10 valid=30s ipv6=off;

    # ALB → OpenResty 는 HTTP (SSL 종단이 ALB) — $scheme 은 항상 "http"
    # WordPress 같은 backend 가 올바른 scheme 알도록 X-Forwarded-Proto 보존
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;   # ALB/Cloudflare 가 보낸 값 (보통 https)
        ""      $scheme;                    # 헤더 없으면 OpenResty $scheme
    }
    map $http_x_forwarded_port $forwarded_port {
        default $http_x_forwarded_port;
        ""      $server_port;
    }

    # lua module search path
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/nginx/lua/?.lua;;";

    # HTTPS cosocket 검증용 CA 번들 (bot_ip_verifier 외부 JSON fetch)
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    # JSON access log (강화)
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"req_len":$request_length,'
        '"req_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"host":"$host",'
        '"ua":"$http_user_agent",'
        '"ref":"$http_referer",'
        '"x_bot_verified":"$sent_http_x_bot_verified"'
        '}';

    access_log /dev/stdout json_combined;

    # Prometheus 메트릭 수집 (요청 종료 시점)
    log_by_lua_block {
        local h = ngx.var.host or "-"
        local s = ngx.var.status or "0"
        local v = ngx.header["X-Bot-Verified"] or "-"
        metric_requests:inc(1, {h, s, v})
        local rt = tonumber(ngx.var.request_time) or 0
        metric_latency:observe(rt, {h})
        local bs = tonumber(ngx.var.bytes_sent) or 0
        metric_bytes:inc(bs, {h})
    }

    # /metrics 엔드포인트 (포트 9145, 외부 노출 안 함)
    server {
        listen 9145;
        server_name _;
        access_log off;
        location /metrics {
            content_by_lua_block {
                metric_connections:set(ngx.var.connections_reading,  {"reading"})
                metric_connections:set(ngx.var.connections_waiting,  {"waiting"})
                metric_connections:set(ngx.var.connections_writing,  {"writing"})
                prometheus:collect()
            }
        }
        location /nginx_status {
            stub_status;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
