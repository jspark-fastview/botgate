worker_processes auto;
error_log /dev/stderr warn;

env TOKEN_API_HOST;
env TOKEN_API_PORT;
env BOTGATE_BYPASS_KEY;
env ADMIN_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # shared dict for rDNS cache (1m ≈ ~8000 entries)
    lua_shared_dict rdns_cache 1m;

    # Docker 내부 DNS (cosocket hostname 해석용)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # lua module search path
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/nginx/lua/?.lua;;";

    # JSON access log
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"host":"$host",'
        '"ua":"$http_user_agent",'
        '"ref":"$http_referer",'
        '"x_bot_verified":"$http_x_bot_verified"'
        '}';

    access_log /dev/stdout json_combined;

    include /etc/nginx/conf.d/*.conf;
}
