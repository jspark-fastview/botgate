worker_processes auto;
error_log /dev/stderr warn;

env TOKEN_API_HOST;
env TOKEN_API_PORT;
env INTERNAL_API_HOST;
env INTERNAL_API_PORT;
env ADMIN_API_HOST;
env ADMIN_API_PORT;
env BOTGATE_BYPASS_KEY;
env ADMIN_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # shared dict for rDNS cache (1m ≈ ~8000 entries)
    lua_shared_dict rdns_cache 1m;
    # shared dict for dynamic bot catalog (fetched from token-api every 5 min)
    lua_shared_dict bot_catalog 512k;
    # shared dict for prometheus metrics
    lua_shared_dict prometheus_metrics 10M;

    # Prometheus 메트릭 초기화
    init_by_lua_block {
        prometheus = require("prometheus").init("prometheus_metrics")
        metric_requests = prometheus:counter(
            "nginx_http_requests_total",
            "Number of HTTP requests",
            {"host", "status", "bot_verified"})
        metric_latency = prometheus:histogram(
            "nginx_http_request_duration_seconds",
            "HTTP request latency",
            {"host"})
        metric_bytes = prometheus:counter(
            "nginx_http_response_size_bytes",
            "Total bytes sent",
            {"host"})
        metric_connections = prometheus:gauge(
            "nginx_http_connections",
            "Number of HTTP connections",
            {"state"})
    }

    init_worker_by_lua_block {
        local cjson_safe = require "cjson.safe"
        local host = os.getenv("INTERNAL_API_HOST") or os.getenv("TOKEN_API_HOST") or "localhost"
        local port = os.getenv("INTERNAL_API_PORT") or os.getenv("TOKEN_API_PORT") or "3000"
        local base = "http://" .. host .. ":" .. port

        local function fetch(path, timeout)
            local http  = require "resty.http"
            local httpc = http.new()
            httpc:set_timeout(timeout or 5000)
            local res, err = httpc:request_uri(base .. path, { method = "GET" })
            httpc:close()
            return res
        end

        -- 봇 카탈로그 5분마다 갱신
        local function refresh_catalog()
            local res = fetch("/internal/bot-catalog", 5000)
            if res and res.status == 200 and res.body then
                ngx.shared.bot_catalog:set("json",    res.body)
                ngx.shared.bot_catalog:set("version", ngx.now())
            end
        end

        -- 긴급 바이패스 10초마다 폴링
        local function refresh_bypass()
            local res = fetch("/internal/bypass", 2000)
            if res and res.status == 200 and res.body then
                local d = cjson_safe.decode(res.body)
                ngx.shared.bot_catalog:set("bypass", (d and d.bypass) and "1" or "0")
            end
        end

        -- 워커 0만 fetch (공유 dict에 저장, 모든 워커가 읽음)
        if ngx.worker.id() == 0 then
            ngx.timer.at(1,   function() refresh_catalog() end)
            ngx.timer.at(1,   function() refresh_bypass()  end)
            ngx.timer.every(300, function() refresh_catalog() end)
            ngx.timer.every(10,  function() refresh_bypass()  end)
        end
    }

    # Docker 내부 DNS (cosocket hostname 해석용)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # lua module search path
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/nginx/lua/?.lua;;";

    # JSON access log (강화)
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"req_len":$request_length,'
        '"req_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"host":"$host",'
        '"ua":"$http_user_agent",'
        '"ref":"$http_referer",'
        '"x_bot_verified":"$sent_http_x_bot_verified"'
        '}';

    access_log /dev/stdout json_combined;

    # Prometheus 메트릭 수집 (요청 종료 시점)
    log_by_lua_block {
        local h = ngx.var.host or "-"
        local s = ngx.var.status or "0"
        local v = ngx.header["X-Bot-Verified"] or "-"
        metric_requests:inc(1, {h, s, v})
        local rt = tonumber(ngx.var.request_time) or 0
        metric_latency:observe(rt, {h})
        local bs = tonumber(ngx.var.bytes_sent) or 0
        metric_bytes:inc(bs, {h})
    }

    # /metrics 엔드포인트 (포트 9145, 외부 노출 안 함)
    server {
        listen 9145;
        server_name _;
        access_log off;
        location /metrics {
            content_by_lua_block {
                metric_connections:set(ngx.var.connections_reading,  {"reading"})
                metric_connections:set(ngx.var.connections_waiting,  {"waiting"})
                metric_connections:set(ngx.var.connections_writing,  {"writing"})
                prometheus:collect()
            }
        }
        location /nginx_status {
            stub_status;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
