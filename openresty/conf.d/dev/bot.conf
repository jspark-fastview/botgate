server {
    listen 80 default_server;
    server_name _;

    # 요청 스코프 변수 — 채널 업스트림 URL 저장용
    set $channel_upstream '';
    # 요청 스코프 — upstream 의 실제 hostname (Host 헤더로 사용)
    set $proxy_host_override '';

    # ── Loki JSON access log 용 변수 (log_by_lua 가 채움) ───────────
    set $bot_name '';
    set $bot_vendor '';
    set $bot_purpose '';
    set $bot_category 'user';
    set $bot_action 'pass';
    set $bot_verified_log '0';
    set $bot_billed '0';
    set $bot_blocked '0';

    # 매 요청 종료 시 ngx.ctx → ngx.var 복사 → access_log 가 사용
    log_by_lua_block {
        local cls = ngx.ctx.classification
        if cls then
            ngx.var.bot_name     = cls.name or ""
            ngx.var.bot_vendor   = cls.vendor or ""
            ngx.var.bot_purpose  = cls.purpose or ""
            ngx.var.bot_category = cls.category or "user"
        end
        if ngx.ctx.bot_action   then ngx.var.bot_action       = ngx.ctx.bot_action end
        if ngx.ctx.bot_verified then ngx.var.bot_verified_log = ngx.ctx.bot_verified end
        if ngx.ctx.bot_billed   then ngx.var.bot_billed       = ngx.ctx.bot_billed end
        if ngx.ctx.bot_blocked  then ngx.var.bot_blocked      = ngx.ctx.bot_blocked end
    }

    # JSON access log → stdout (Alloy 가 자동 수집)
    access_log /dev/stdout guardus_json;

    # ── 메인 게이트 ────────────────────────────────────────
    location / {

        # 1) 봇 필터 + 채널 업스트림 조회
        access_by_lua_block {
            local filter   = require "bot_filter"
            local channels = require "channels"
            local logger   = require "logger"
            local settings = require "settings"

            -- 캐시 청소 모드 활성 여부 (header_filter 가 cosocket 못 쓰므로 여기서 결정)
            local exp = tonumber(settings.get("cache_purge_expires_at")) or 0
            ngx.ctx.cache_purge_active = (exp > ngx.time())

            -- 봇 필터 (403/402/401 이면 여기서 ngx.exit)
            filter.run()

            -- 필터 통과 → 채널 업스트림 세팅
            -- X-Original-Host (Cloudflare Worker 등 엣지에서 원본 호스트 전달)
            -- 헤더가 있으면 그걸 우선, 없으면 Host 헤더 사용
            local lookup_host = ngx.req.get_headers()["X-Original-Host"] or ngx.var.host
            local up = channels.get_upstream(lookup_host)
            if up and up ~= "" then
                -- upstream URL 에서 scheme+host 만 추출, 실제 요청 경로/쿼리를 사용
                -- 이렇게 해야 /en/about 요청 시 upstream 호출도 /en/about 으로 감
                local upstream_scheme = up:match("^(https?)://") or "https"
                local upstream_host   = up:match("^https?://([^/?]+)")
                if upstream_host then
                    local req_uri = ngx.var.request_uri or "/"
                    -- 캐시버스터(_bgts) 는 WP 같은 backend 가 canonical redirect 일으켜 무한루프 유발 → 제거
                    -- (Cloudflare /en 정확매칭 차단 같은 특수 케이스는 채널별 옵션으로 추후 대응)
                    ngx.var.channel_upstream    = upstream_scheme .. "://" .. upstream_host .. req_uri
                    -- Host 헤더는 채널 도메인 그대로 유지
                    -- (ALB host-based routing, 가상호스트 등 backend 가 원본 도메인으로 매칭)
                    ngx.var.proxy_host_override = lookup_host

                    -- 엣지 루프 방지 헤더
                    local bypass = os.getenv("BOTGATE_BYPASS_KEY")
                    if bypass and bypass ~= "" then
                        ngx.req.set_header("X-Botgate-Bypass", bypass)
                    end
                end

                -- 채널 프록시되는 트래픽 로깅 (bot_filter 가 이미 로깅한 AI 봇은 스킵)
                if not ngx.ctx.access_logged then
                    local bot_classifier = require "bot_classifier"
                    -- bot_filter 에서 미리 분류했으면 재사용, 아니면 여기서 다시
                    local cls = ngx.ctx.classification
                              or bot_classifier.classify(ngx.var.http_user_agent or "")
                    logger.access(
                        ngx.var.http_user_agent or "",
                        lookup_host,
                        ngx.var.remote_addr,
                        ngx.var.request_uri or "/",
                        true,           -- verified
                        false,          -- billed
                        cls.category,
                        cls.purpose,
                        cls.name,
                        cls.vendor,
                        false           -- blocked=false (통과)
                    )
                    -- Loki JSON access log 용 ctx
                    ngx.ctx.access_logged = true
                    ngx.ctx.bot_action    = "pass"
                    ngx.ctx.bot_verified  = "1"
                    ngx.ctx.bot_billed    = "0"
                    ngx.ctx.bot_blocked   = "0"
                end
            end
        }

        # 2) 채널 있으면 프록시, 없으면 디버그 JSON
        content_by_lua_block {
            if ngx.var.channel_upstream ~= "" then
                ngx.exec("@channel_proxy")
                return
            end

            -- 채널 미설정: 동작 확인용 JSON 응답
            local cjson = require "cjson.safe"
            ngx.header["Content-Type"] = "application/json"
            local headers = ngx.req.get_headers()
            ngx.say(cjson.encode({
                status            = "no_channel",
                message           = "Host 에 연결된 채널이 없습니다. 관리 UI 에서 채널을 추가하세요.",
                host              = ngx.var.host,
                x_original_host   = headers["X-Original-Host"] or "(none)",
                lookup_used       = headers["X-Original-Host"] or ngx.var.host,
                ip                = ngx.var.remote_addr,
                ua                = ngx.var.http_user_agent,
                bot_verified      = ngx.var.http_x_bot_verified or "0",
                uri               = ngx.var.request_uri,
            }))
        }
    }

    # ── 채널 리버스 프록시 ─────────────────────────────────
    location @channel_proxy {
        internal;

        proxy_pass              $channel_upstream;

        # 업스트림이 https:// 여도 인증서 검증 안 함 (자체 서명/내부 CA 허용)
        proxy_ssl_verify        off;
        proxy_ssl_server_name   on;   # SNI 전송 (가상 호스팅 지원)
        # SNI 를 채널 도메인(예: www.pure-beef.kr)으로 전송 — upstream ALB 가
        # SNI 기반으로 SSL 인증서 선택 + host-rule 매칭. 안 하면 잘못된 cert(tripplus 등)
        proxy_ssl_name          $proxy_host_override;

        # upstream URL 의 hostname 으로 Host 헤더 세팅
        # (proxy_host_override 가 비어있으면 fallback 으로 $host 사용)
        proxy_set_header        Host              $proxy_host_override;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        # ALB/Cloudflare 가 보낸 X-Forwarded-Proto 우선 (HTTPS 종단점 정보 보존)
        # 없으면 OpenResty 의 $scheme (보통 http — ALB가 SSL 종단)
        proxy_set_header        X-Forwarded-Proto $forwarded_proto;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_set_header        X-Forwarded-Port  $forwarded_port;

        # botgate 메타 헤더 (채널 서버에서 활용 가능)
        proxy_set_header        X-Bot-Verified    $http_x_bot_verified;
        proxy_set_header        X-Bot-Plan        $http_x_bot_plan;
        proxy_set_header        X-Bot-Billed      $http_x_bot_billed;

        # X-Botgate-Bypass 헤더는 access_by_lua_block 에서 세팅되어 자동 전달됨

        # 캐시 강제 청소 모드 — access phase 에서 결정한 결과 ngx.ctx 로 전달
        header_filter_by_lua_block {
            if ngx.ctx.cache_purge_active then
                ngx.header["Clear-Site-Data"] = '"cache"'
            end
            ngx.header["Strict-Transport-Security"] = "max-age=31536000; includeSubDomains"
        }

        # 타임아웃
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;

        # 버퍼
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           4 64k;
    }

    # ── 내부 캐시 무효화 (채널/경로규칙 변경 후 즉시 반영) ──
    location /_internal/cache/invalidate {
        allow 172.16.0.0/12;   # Docker 내부 네트워크
        allow 127.0.0.1;
        deny  all;

        content_by_lua_block {
            require("channels").invalidate()
            require("path_rules").invalidate()
            require("settings").invalidate()
            require("purpose_policies").invalidate()
            -- 토큰 캐시도 같이 비움 (revoke/issue 즉시 반영)
            local tc = ngx.shared.token_cache
            if tc then tc:flush_all() end
            ngx.header["Content-Type"] = "application/json"
            ngx.say('{"ok":true}')
        }
    }

    # ── PoC 전용: rDNS 직접 테스트 ────────────────────────
    location /test/rdns {
        default_type application/json;
        content_by_lua_block {
            local rdns  = require "rdns"
            local cjson = require "cjson.safe"

            local test_ip = ngx.req.get_headers()["X-Test-IP"] or ngx.var.remote_addr
            local ua      = ngx.var.http_user_agent or ""

            local is_ai, verified, detail = rdns.verify(ua, test_ip)

            ngx.say(cjson.encode({
                test_ip  = test_ip,
                ua       = ua,
                is_ai    = is_ai,
                verified = verified,
                detail   = detail,
            }))
        }
    }
}
