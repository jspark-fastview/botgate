# 신규 스택 — 기존 botgate 스택과 독립된 프로젝트로 관리
# 기동: docker compose -p guardus-new -f docker-compose.new-stack.yml --env-file .env up -d
# 중단: docker compose -p guardus-new -f docker-compose.new-stack.yml down
name: guardus-new

services:
  internal-api:
    build: ./internal-api
    # 외부 포트 노출 불필요 — OpenResty가 botgate_default 네트워크로 직접 접근
    volumes:
      - token-data:/app/data
    restart: unless-stopped
    networks:
      - default
      - botgate_default    # OpenResty가 internal-api 이름으로 접근 가능

  admin-api:
    build: ./admin-api
    ports:
      - "3001:3002"   # 호스트 3001 → 컨테이너 3002 (ALB 타겟: :3001)
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
      - STATS_KEY=${STATS_KEY:-}
      - OPENRESTY_HOST=openresty
      - OPENRESTY_PORT=80
      - WEB_DIR=/app/web
    volumes:
      - token-data:/app/data
      - ./web:/app/web:ro   # 어드민 SPA 정적 파일
    restart: unless-stopped
    networks:
      default: {}
      botgate_default:
        aliases:
          - admin-api   # OpenResty가 admin-api 이름으로 접근 가능

  frontend:
    build: ./frontend
    ports:
      - "3003:3003"
    environment:
      - API_URL=http://admin-api:3002
    restart: unless-stopped
    networks:
      - default

volumes:
  token-data:
    external: true
    name: botgate_token-data

networks:
  default:
  botgate_default:
    external: true
    name: botgate_default
