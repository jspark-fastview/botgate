# 신규 스택 — 기존 botgate 스택과 독립된 프로젝트로 관리
# 기동: docker compose -p guardus-new -f docker-compose.new-stack.yml --env-file .env up -d
# 중단: docker compose -p guardus-new -f docker-compose.new-stack.yml down
name: guardus-new

services:
  internal-api:
    build: ./internal-api
    ports:
      - "3001:3001"
    volumes:
      - token-data:/app/data
    restart: unless-stopped
    networks:
      - default
      - botgate_default    # OpenResty가 internal-api 이름으로 접근 가능

  admin-api:
    build: ./admin-api
    ports:
      - "3002:3002"
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
      - STATS_KEY=${STATS_KEY:-}
    volumes:
      - token-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3003:3003"
    restart: unless-stopped

volumes:
  token-data:
    external: true
    name: botgate_token-data

networks:
  default:
  botgate_default:
    external: true
    name: botgate_default
