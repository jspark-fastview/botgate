# ArgoCD 부트스트랩 — install manifest + 우리 config 패치 한 묶음
# 부트스트랩 명령:
#   kubectl create namespace argocd
#   kubectl apply -k k8s/bootstrap/argocd/
#
# 향후 변경 (helm options 추가 등) 은 이 파일을 수정 후 같은 명령 재실행하거나,
# ArgoCD 가 자기자신을 sync 하도록 self-managed Application 추가 (todo).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 중요: ArgoCD install.yaml 은 namespace-less manifest — 여기서 명시 안 하면 default 로 떨어짐
namespace: argocd

resources:
  # ArgoCD 안정 버전 핀 — 학습 후 주기적 bump 권장
  # 2026-05-29: v2.12.4 → v3.4.3. K8s 1.35 의 sts .status.terminatingReplicas field 를
  # v2.12 이 schema 모름 → 여러 app sync "Unknown" (ComparisonError). 3.3+ 가 1.35 지원.
  # v3 breaking change 영향 작음: Dex SSO 안 씀, repoURL inline, ApplyOutOfSyncOnly 안 씀.
  # annotation-based tracking 전환 — 첫 sync 시 reconcile 자동.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.3/manifests/install.yaml

patches:
  # argocd-cm 에 kustomize.buildOptions=--enable-helm 주입.
  # 없으면 platform 의 helmCharts inflate 실패.
  - target:
      kind: ConfigMap
      name: argocd-cm
      namespace: argocd
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
        namespace: argocd
      data:
        kustomize.buildOptions: --enable-helm
