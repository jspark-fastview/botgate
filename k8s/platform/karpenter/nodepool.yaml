# NodePool — Spot/On-Demand mix + 다양한 instance types
# 한 번에 모든 Spot 이 interrupt 되는 사고 방지.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        # karpenter.sh/* 는 Karpenter 자체 reserved domain — 사용 금지.
        # 사용자 label 용 guardus.io/* 사용.
        guardus.io/provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind:  EC2NodeClass
        name:  default

      # 인스턴스 다양화 — ARM64 (Graviton) + 명시적 family list + 다양한 size.
      # 단일 family (c8g.large) 만 시도하면 spot capacity 부족 시 stuck.
      # 명시적 family list 로 Karpenter 가 spot 회수 시 빠른 fallback (다른 family) 가능.
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]   # Spot 우선, 부족 시 On-Demand 자동
        # explicit instance-family list — 7 family × 4 size = 28 옵션 (spot 회수 시 빠른 대체)
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - t4g                          # general burstable (가벼운 워크로드)
            - c6g                          # compute Gen6 (저렴)
            - c7g                          # compute Gen7
            - c8g                          # compute Gen8 (최신)
            - m6g                          # general Gen6
            - m7g                          # general Gen7
            - m8g                          # general Gen8 (최신)
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["medium", "large", "xlarge", "2xlarge"]
        # 명시적 CPU range — 너무 작은 (1 vCPU) 또는 너무 큰 노드 회피.
        # daemonset overhead 211m + 워크로드 가장 큰 게 prometheus 1611Mi → 2 vCPU/4GB 이상 필요
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4", "8"]
        - key: topology.kubernetes.io/zone
          operator: In
          # 4 AZ 모두 — 2c IP 고갈 대응으로 b/d 도 사용 (Terraform vpc.tf 에서 태그 추가됨)
          values:
            - ap-northeast-2a
            - ap-northeast-2b
            - ap-northeast-2c
            - ap-northeast-2d

      # 노드 lifecycle
      expireAfter: 720h   # 30일 후 자동 교체 (Bottlerocket 보안 패치)

  # Consolidation — 사용 안 하는 노드 자동 정리 → 비용 절감
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
    # budgets: 한 번에 disruption 되는 노드 수 제한
    budgets:
      - nodes: "10%"     # 평소 10% 만 동시 disruption
      - nodes: "0"       # 사용자 정의 시간대엔 disruption 금지 (선택)
        schedule: "0 9 * * mon-fri"
        duration: 8h

  # 비용 / 성능 weight — Spot 충분하면 그쪽으로 끌어감
  weight: 100

  limits:
    cpu: 100
    memory: 200Gi
