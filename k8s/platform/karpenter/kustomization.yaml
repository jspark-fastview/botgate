# Karpenter chart — kustomize helm inflation (--enable-helm)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: karpenter

helmCharts:
  - name: karpenter
    repo: oci://public.ecr.aws/karpenter
    version: "1.0.6"
    releaseName: karpenter
    namespace: karpenter
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - ec2nodeclass.yaml
  - nodepool.yaml
  - rbac-extra.yaml
