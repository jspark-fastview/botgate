# Karpenter chart 1.0.6 의 default ClusterRole 에 누락된 권한 추가.
# 증상: nodeclass.status reconciler 가 "Starting workers" 못 함 →
#       EC2NodeClass.status 안 채워짐 → "no subnets found" 무한 출력.
# 원인: controller-runtime 이 *v1.Lease informer 를 kube-node-lease 에서
#       list/watch 하려는데 권한 부족 → cache sync fail → worker 미동작.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karpenter-extra
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karpenter-extra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: karpenter-extra
subjects:
  - kind: ServiceAccount
    name: karpenter
    namespace: karpenter
