# Karpenter controller — Pod Identity 사용 (Terraform module 이 association 생성).
# SettingsConfigMap 으로 cluster 정보 주입.

settings:
  clusterName: guardus-eks
  # Terraform karpenter module 이 만든 interruption queue name
  # (실제 SQS 이름은 "Karpenter-<clusterName>" — module default prefix)
  interruptionQueue: Karpenter-guardus-eks
  # batchIdleDuration / maxBatchDuration: scheduling 효율
  batchMaxDuration: 10s
  batchIdleDuration: 1s

controller:
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

# Karpenter 자체는 stable 워크로드 → 기본 managed node group 위에서 동작.
# Karpenter-managed 노드는 affinity 로 회피 (preferred — managed group 없으면 Karpenter 위에서도 OK).
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: guardus.io/provisioner
              operator: DoesNotExist

# 보안: Pod Identity 사용 — serviceAccount.annotations 의 eks.amazonaws.com/role-arn 불필요
serviceAccount:
  create: true
  name: karpenter

# 로그 verbosity
logLevel: info

# replicas — controller HA
replicas: 2

# PDB
podDisruptionBudget:
  name: karpenter
  maxUnavailable: 1
