# kube-prometheus-stack helm values
fullnameOverride: kps

# Prometheus
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "20GB"
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi
    # 모든 namespace 의 ServiceMonitor 자동 발견
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # external_labels — Mimir 에서 replicas dedup + tenant 격리
    externalLabels:
      cluster: guardus-eks-v2
      env: prod

    # 2026-05-22: Mimir prod (monitoring-prod) 로 remoteWrite — metric 무유실 + 장기보관.
    # 기존 15d EBS 는 단기 캐시 역할. 장기 query 는 Grafana 의 Mimir-Prod datasource.
    remoteWrite:
      - url: http://mimir-distributor.monitoring-prod.svc.cluster.local:8080/api/v1/push
        headers:
          X-Scope-OrgID: guardus-prod
        queueConfig:
          maxShards: 50
          capacity: 10000
          maxSamplesPerSend: 2000
          batchSendDeadline: 5s
          minBackoff: 30ms
          maxBackoff: 5s

# Grafana — 2026-05-22 비활성 (3개 중복 → 2개로 통합).
# prod 모니터링은 monitoring-prod/grafana-prod 가 인계 (Mimir-Prod + KPS Prom + Loki).
# dev 는 monitoring-dev/grafana-dev.
grafana:
  enabled: false

# Alertmanager
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

# 노드 메트릭
nodeExporter:
  enabled: true

# kube-state-metrics
kubeStateMetrics:
  enabled: true

# EKS 환경에서 비활성화 권장 (control-plane 접근 불가)
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
