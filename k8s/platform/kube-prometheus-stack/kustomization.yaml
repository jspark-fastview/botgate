apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# Grafana sidecar 가 label grafana_dashboard=1 인 ConfigMap 자동 발견 → import.
resources:
  - dashboards/guardus-latency.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 62.6.0
    releaseName: kps
    namespace: monitoring
    valuesFile: values.yaml
    includeCRDs: true
