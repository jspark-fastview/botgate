# KEDA metrics-server 는 kube-system 의 extension-apiserver-authentication configmap 을 읽어
# API aggregation TLS handshake 검증함. Helm chart 의 자동 RoleBinding 이 우리 namespace
# (keda) 의 SA 와 매칭 안 되는 경우 CrashLoopBackOff. 명시적으로 binding.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keda-auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: keda-metrics-server
    namespace: keda
