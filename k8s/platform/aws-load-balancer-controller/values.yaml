# AWS Load Balancer Controller helm values
# 인증: EKS Pod Identity (Terraform 의 aws_eks_pod_identity_association.aws_lb_controller).
# 매니페스트에 ARN 박을 필요 X — chart 가 평범한 SA 만들면 끝.
clusterName: guardus-eks
region: ap-northeast-2

serviceAccount:
  create: true                # 평범한 SA — annotation 없음
  name: aws-load-balancer-controller

# replica — controller 자체 HA
replicaCount: 2

# Prometheus 스크랩
serviceMonitor:
  enabled: true
  namespace: monitoring

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 500Mi
