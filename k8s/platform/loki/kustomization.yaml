apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 6.16.0
    releaseName: loki
    namespace: monitoring
    valuesFile: values.yaml
    includeCRDs: true

# Chart 가 명시한 retention=Delete override (values.yaml 의 옵션 안 먹힘)
patches:
  - path: patches/retention.yaml
    target:
      kind: StatefulSet
      name: loki
