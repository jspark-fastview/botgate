# Loki — SimpleScalable 모드 (2026-05-29 전환).
# 배경: admin-api stats cold start 시 query 폭증 → single-binary 1 pod CPU 폭주 + 노드 throttle.
# 방향: scale-out — read(querier) 컴포넌트 autoscaling 으로 burst 시 여러 pod 분산.
# (single pod 성능 짜내기 X — loki_scale_out_not_up 메모리 학습)
#
# 구조 (S3 backend, 데이터 무손실):
#   - read    : querier + query-frontend. burst 시 autoscale (2~6). ★ cold/burst 분산
#   - write   : ingester + distributor. RF 위해 replicas 2.
#   - backend : compactor + ruler + index-gateway. replicas 2.

deploymentMode: SimpleScalable

# ── read (querier) — burst 시 scale-out 핵심 ──────────────────────
read:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  resources:
    requests: { cpu: 300m, memory: 512Mi }
    limits:   { cpu: 2000m, memory: 2Gi }

# ── write (ingester) — RF=2 ───────────────────────────────────────
write:
  replicas: 2
  persistence:
    storageClass: gp3
    size: 10Gi
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 2Gi }

# ── backend (compactor/ruler/index-gateway) ───────────────────────
backend:
  replicas: 2
  persistence:
    storageClass: gp3
    size: 10Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# 학습용 — auth 비활성 (multi-tenant 안 씀)
loki:
  auth_enabled: false

  # SimpleScalable write replicas=2 → RF=2 (quorum). 무유실 ↑.
  commonConfig:
    replication_factor: 2

  schemaConfig:
    configs:
      # S3 backend 단일 schema. 옛 filesystem schema 제거 (cross-schema scan 으로 query 30s+ 소요).
      # 새 cluster 라 historical 데이터 없음 — from 을 과거로 잡아도 안전.
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_s3_index_
          period: 24h

  # S3 backend — IAM 자격증명은 Pod Identity (terraform-v2/s3-loki.tf 의 association) 으로 자동.
  storage:
    type: s3
    bucketNames:
      chunks: guardus-loki-chunks-v2
      ruler:  guardus-loki-chunks-v2
      admin:  guardus-loki-chunks-v2
    s3:
      region: ap-northeast-2
      s3ForcePathStyle: false
      insecure: false

  limits_config:
    retention_period: 60d
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_lookback: 60d
    # /me/stats/pages 의 path 별 group by — 봇 트래픽이 다양한 URL 이라 시리즈 500+ 흔함.
    # 기본 500 이면 "maximum of series reached" HTTP 400 → admin-api 빈 응답.
    max_query_series: 5000
    # 2026-05-29: SimpleScalable — sub-query 가 여러 read pod 에 분산되니
    # split interval 1h 유지 (적정), parallelism 은 read replica 수에 맞춰 적정값.
    split_queries_by_interval: 1h
    max_query_parallelism: 32
    tsdb_max_query_parallelism: 32

  # querier worker 동시성 — read pod 당 8 (여러 pod 라 합산 충분). single-binary 16 폭주 회피.
  querier:
    max_concurrent: 8

  # query 큐 크기 — burst 시 reject 방지.
  query_scheduler:
    max_outstanding_requests_per_tenant: 2048

  compactor:
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem

  ruler:
    enable_api: true

# read/write/backend 는 상단에서 정의 (SimpleScalable). singleBinary 제거.

# 캐시 — resultsCache 활성. admin-api stats 반복 query (offset 별 시간대) 결과 캐싱.
chunksCache:    { enabled: false }
resultsCache:
  enabled: true
  defaultValidity: 12h   # offset 과거 데이터는 안 바뀜 — 길게 캐시
  allocatedMemory: 512

# gateway (nginx) — SimpleScalable 은 read/write 분리라 gateway 가 라우팅. 활성.
gateway:
  enabled: true
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 300m, memory: 128Mi }

# 모니터링 ServiceMonitor (KPS 와 연동)
monitoring:
  selfMonitoring:        { enabled: false }   # 별도 logs-to-loki 흐름 방지
  serviceMonitor:        { enabled: true, namespace: monitoring }
  lokiCanary:            { enabled: false }
  dashboards:            { enabled: false }

# Helm chart 안의 test pod 비활성
test: { enabled: false }
