# Loki — single-binary 모드 (학습/소규모 운영).
# 추후 트래픽 늘면 simple-scalable 또는 distributed 로 마이그레이션 가능.
#
# 저장:
#   - chunks/index: local PVC gp3 10GB (60일 유지 = 약 5GB 예상)
#   - 운영급은 S3 backend 권장 (별도 작업)

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  # Burstable QoS — cold prewarm 시 무거운 query 동시 처리, 평소엔 idle.
  # 노드 여유 있으면 limit 까지 burst (K8s 의 native "일시 리소스 부스트").
  # 노드 (t4g.xlarge = 4 vCPU/16Gi) 의 여유 분 활용. baseline 노드와 spot 둘 다 OK.
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 3500m, memory: 6Gi }
  persistence:
    enabled: true
    storageClass: gp3
    size: 10Gi
  # PVC 보존 정책은 chart values 로 override 안 되어 patches/retention.yaml 으로 강제.

# 학습용 — auth 비활성 (multi-tenant 안 씀)
loki:
  auth_enabled: false

  # single-binary 라 replication 1 (default 3 이면 "not enough replicas" 에러)
  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      # S3 backend 단일 schema. 옛 filesystem schema 제거 (cross-schema scan 으로 query 30s+ 소요).
      # 새 cluster 라 historical 데이터 없음 — from 을 과거로 잡아도 안전.
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_s3_index_
          period: 24h

  # S3 backend — IAM 자격증명은 Pod Identity (terraform-v2/s3-loki.tf 의 association) 으로 자동.
  storage:
    type: s3
    bucketNames:
      chunks: guardus-loki-chunks-v2
      ruler:  guardus-loki-chunks-v2
      admin:  guardus-loki-chunks-v2
    s3:
      region: ap-northeast-2
      s3ForcePathStyle: false
      insecure: false

  limits_config:
    retention_period: 60d
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_lookback: 60d
    # /me/stats/pages 의 path 별 group by — 봇 트래픽이 다양한 URL 이라 시리즈 500+ 흔함.
    # 기본 500 이면 "maximum of series reached" HTTP 400 → admin-api 빈 응답.
    max_query_series: 5000
    # 2026-05-29: admin-api stats cold start 시 offset 별 수십 query 병발 →
    # single querier 큐 17s 폭증 + status=500 → stats/summary 30s+ timeout.
    # split interval ↑ (15m→1h) = sub-query 1/4. max_query_parallelism ↑ = 동시 처리.
    split_queries_by_interval: 1h
    max_query_parallelism: 64
    tsdb_max_query_parallelism: 64

  # querier worker 동시성 ↑ (default 4 → 16). cold start 의 병발 query 처리.
  querier:
    max_concurrent: 16

  # query 큐 크기 ↑ — cold start burst 시 reject 방지.
  query_scheduler:
    max_outstanding_requests_per_tenant: 2048

  compactor:
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem

  ruler:
    enable_api: true

# scalable/distributed 컴포넌트 비활성 (single-binary 사용)
read:    { replicas: 0 }
write:   { replicas: 0 }
backend: { replicas: 0 }

# 캐시 — 2026-05-29: resultsCache 활성. admin-api stats 의 반복 query (offset 별 시간대)
# 결과 캐싱 → cold start 후 2번째 호출부터 빠름. chunksCache 는 메모리 커서 보류.
chunksCache:    { enabled: false }
resultsCache:
  enabled: true
  defaultValidity: 12h   # offset 과거 데이터는 안 바뀜 — 길게 캐시
  allocatedMemory: 512   # MB. single-binary 노드 여유분.

# gateway (nginx) — single-binary 모드면 굳이 필요 없음
gateway:
  enabled: false

# 모니터링 ServiceMonitor (KPS 와 연동)
monitoring:
  selfMonitoring:        { enabled: false }   # 별도 logs-to-loki 흐름 방지
  serviceMonitor:        { enabled: true, namespace: monitoring }
  lokiCanary:            { enabled: false }
  dashboards:            { enabled: false }

# Helm chart 안의 test pod 비활성
test: { enabled: false }
