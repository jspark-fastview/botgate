# Grafana Alloy — log/metrics 수집기 (Promtail/Grafana Agent 후속).
# DaemonSet 으로 노드별 1개. K8s pod stdout/stderr 수집 → Loki push.

alloy:
  configMap:
    create: true
    content: |-
      // K8s pod logs 발견 + 라벨 부여
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Pod 메타데이터를 Loki 라벨로 변환
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        // 표준 라벨
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }

        // 너무 verbose 한 시스템 네임스페이스 제외 (선택)
        rule {
          source_labels = ["namespace"]
          regex         = "kube-system|argocd|external-secrets|cert-manager"
          action        = "drop"
        }
      }

      // 컨테이너 stdout/stderr 수집 — openresty JSON access log 는 별도 처리 (host/category stream label promote)
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.openresty_json.receiver]
      }

      // OpenResty access log JSON parse → host/category 를 stream label 로 승격.
      // 효과: host=~ 매칭이 chunk 단위 인덱스로 → /me/stats/* 등 cache miss 10-100× 빠름.
      // cardinality 안전: host 10개 이내, category 4종 (user/bot/other_bot/malicious).
      // bot_name/path 는 cardinality 커서 line filter 유지.
      loki.process "openresty_json" {
        forward_to = [loki.write.default.receiver]

        // app=openresty 인 line 만 JSON parse (다른 stream 은 stage skip)
        stage.match {
          selector = "{app=\"openresty\"}"
          stage.json {
            expressions = {
              host     = "host",
              category = "category",
            }
          }
          // 빈 값이면 stream label 안 박힘 (Loki 자동)
          stage.labels {
            values = {
              host     = "",
              category = "",
            }
          }
        }
      }

      // Loki 로 push — single-binary 모드 service 명
      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc:80/loki/api/v1/push"
        }
      }

  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

controller:
  type: daemonset
  # 2026-05-28: baseline NG 가 NoSchedule taint (role=openresty) 적용됨.
  # universal toleration 으로 모든 노드 log 수집 보장.
  tolerations:
    - operator: Exists
