# Cilium values — guardus-eks-v2 (2026-05-28 helm get 으로 추출 user-supplied values)
# 이전 helm CLI 로 직접 install 됐던 4 revision 의 values 를 git 에 보존.
# ArgoCD 가 같은 release name 으로 adopt — Manual sync (위험 회피).
#
# Mode: ENI (AWS native, secondary CIDR pod IP)
# - endpointRoutes.enabled: pod → host network 직접 routing (AWS VPC native)
# - eni.enabled: AWS ENI 를 IPAM 백엔드로 사용
# - egressMasqueradeInterfaces: eth0 으로만 NAT (다른 interface 무시)
#
# Hubble: 옵저버빌리티 — DNS / drop / TCP / flow / ICMP / HTTP metrics + Relay UI

egressMasqueradeInterfaces: eth0
endpointRoutes:
  enabled: true
eni:
  enabled: true

# 2026-05-28: BPF masquerade 활성.
# 원인: Karpenter 노드의 secondary ENI (172.21.x.x) pod 가 외부 API 도달 못 함.
#   - mngd NG launch_template 와 Karpenter NodeClass 의 ENI 구조 차이로 iptables masq fail
#   - ebs-csi-controller / aws-load-balancer-controller / kube-state-metrics 등 CrashLoop
# BPF masquerade = eBPF 로 모든 ENI 의 pod outbound traffic SNAT → host primary IP 로.
# ENI mode 호환 + Cilium 1.16+ 안정 지원.
bpf:
  masquerade: true
hubble:
  enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - icmp
      - http
    serviceMonitor:
      enabled: false
  relay:
    enabled: true
