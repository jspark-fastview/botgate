# ClusterSecretStore — AWS Secrets Manager 연결 정의
# 인증: EKS Pod Identity.
#   spec.provider.aws.auth 블록 자체 생략 → ESO 가 AWS SDK 의 default credential chain 사용 →
#   pod 의 AWS_CONTAINER_CREDENTIALS_FULL_URI 환경변수 자동 인식 (Pod Identity Agent 가 주입).
#
# 매핑은 Terraform 의 aws_eks_pod_identity_association.external_secrets 가 담당:
#   namespace=external-secrets, sa=external-secrets → role guardus-external-secrets
#
# 주의: auth.jwt.serviceAccountRef 사용은 IRSA 전용 (SA 의 eks.amazonaws.com/role-arn annotation 필요).
# 우리는 annotation 박지 않으므로 jwt 블록 쓰면 인증 실패.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
