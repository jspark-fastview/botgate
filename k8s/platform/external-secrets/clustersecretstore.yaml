# ClusterSecretStore — AWS Secrets Manager 연결 정의
# 인증: EKS Pod Identity (annotation 없음).
# 매핑은 Terraform 의 aws_eks_pod_identity_association.external_secrets 가 담당:
#   namespace=external-secrets, sa=external-secrets → role guardus-external-secrets
# helm chart 가 SA 'external-secrets' 를 생성하므로 여기서 SA 정의 X.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
