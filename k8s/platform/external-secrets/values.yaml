# External Secrets Operator helm values
# 인증: EKS Pod Identity (Terraform 의 aws_eks_pod_identity_association.external_secrets).
# SA 이름이 'external-secrets' 로 고정되어야 매핑이 맞음 (chart 기본값).
installCRDs: true

serviceAccount:
  create: true
  name: external-secrets

# HA — SPOF 제거. 단일 replica 가 IP 고갈/노드 장애로 죽으면 webhook 전체 down →
# 모든 ArgoCD sync 가 막혔던 사고(2026-06-01) 재발 방지. 한 replica 가 죽어도
# 다른 노드의 replica 가 endpoints 제공 → sync 안 막힘.
replicaCount: 2

webhook:
  replicaCount: 2
  # 2 replica 를 서로 다른 노드에 — 한 노드 IP 고갈/interruption 시 동시 사망 회피
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: external-secrets-webhook
            topologyKey: kubernetes.io/hostname

certController:
  replicaCount: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: external-secrets-cert-controller
            topologyKey: kubernetes.io/hostname

serviceMonitor:
  enabled: true
  namespace: monitoring

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
