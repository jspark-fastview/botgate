# prod 전용 Grafana — monitoring-prod namespace.
# datasource: Mimir-Prod (장기 S3) + KPS Prometheus (단기 15d 캐시).
# dev (grafana-dev) 와 완전 분리, 기존 monitoring/grafana (KPS) 와도 분리.
#
# Admin credentials — AWS Secrets Manager (guardus/prod/grafana-admin) → ExternalSecret → K8s Secret 'grafana-prod-admin'.
# secret 생성 명령은 externalsecret.yaml 헤더 참조.
admin:
  existingSecret: grafana-prod-admin
  userKey: admin-user
  passwordKey: admin-password

# Dashboard / settings 영속
persistence:
  enabled: true
  storageClassName: gp3
  size: 10Gi

# prod 라 더 큰 resource
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# HA — 2 replicas (단 sqlite 백엔드라 1만 권장. prod 도 1)
replicas: 1

# port-forward only (Ingress 분리, 외부 노출 X)
service:
  type: ClusterIP
ingress:
  enabled: false

# Datasource auto-provisioning
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # Mimir prod — 장기 metric (default)
      - name: Mimir-Prod
        type: prometheus
        uid: mimir-prod
        url: http://mimir-query-frontend.monitoring-prod.svc.cluster.local:8080/prometheus
        access: proxy
        isDefault: true
        jsonData:
          httpHeaderName1: X-Scope-OrgID
          timeout: 60
        secureJsonData:
          httpHeaderValue1: guardus-prod
      # 기존 KPS Prometheus — 단기 15d 캐시 (Mimir push 지연 시 fallback)
      - name: Prometheus-KPS
        type: prometheus
        uid: prometheus-kps
        url: http://kps-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: false
      # Loki (공통, prod log)
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false

# Sidecar — prod 전용 dashboard ConfigMap 자동 import
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard_prod
    searchNamespace: monitoring-prod
  datasources:
    enabled: false   # 위 datasources block 직접 정의로 충분

# grafana.com 의 표준 dashboard 자동 다운로드 (KPS Grafana 비활성 후 빈 슬롯 채움)
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    # Node Exporter Full — 노드별 CPU/Mem/Disk/Net 상세
    node-exporter-full:
      gnetId: 1860
      revision: 41
      datasource: Mimir-Prod
    # Kubernetes / Views / Pods — pod 별 자원 사용
    kubernetes-views-pods:
      gnetId: 15760
      revision: 38
      datasource: Mimir-Prod
    # Kubernetes / Views / Nodes — 노드별 자원
    kubernetes-views-nodes:
      gnetId: 15759
      revision: 36
      datasource: Mimir-Prod
    # Kubernetes / Views / Namespaces
    kubernetes-views-namespaces:
      gnetId: 15758
      revision: 43
      datasource: Mimir-Prod
    # Kubernetes / Views / Global — cluster overview
    kubernetes-views-global:
      gnetId: 15757
      revision: 43
      datasource: Mimir-Prod
    # Kubernetes / API server
    kubernetes-api-server:
      gnetId: 15761
      revision: 19
      datasource: Mimir-Prod
    # Kubelet
    kubelet:
      gnetId: 15762
      revision: 21
      datasource: Mimir-Prod
    # CoreDNS
    coredns:
      gnetId: 15762
      revision: 21
      datasource: Mimir-Prod

# 보안
grafana.ini:
  auth.anonymous:
    enabled: false
  security:
    allow_embedding: false
