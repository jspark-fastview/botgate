# Grafana-prod admin credentials — AWS Secrets Manager 에서 sync.
# 사용자가 미리 secret 만들어야:
#   aws secretsmanager create-secret \
#     --region ap-northeast-2 \
#     --name guardus/prod/grafana-admin \
#     --secret-string '{"admin-user":"admin","admin-password":"<강한 password>"}' \
#     --recovery-window-in-days 30
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-prod-admin
  namespace: monitoring-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: grafana-prod-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef: { key: guardus/prod/grafana-admin, property: admin-user }
    - secretKey: admin-password
      remoteRef: { key: guardus/prod/grafana-admin, property: admin-password }
