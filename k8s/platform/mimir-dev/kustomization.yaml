apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring-dev

# monitoring-dev namespace + ArgoCD 가 자동 생성하지만 명시
resources:
  - namespace.yaml

helmCharts:
  - name: mimir-distributed
    repo: https://grafana.github.io/helm-charts
    version: 5.7.0
    releaseName: mimir
    namespace: monitoring-dev
    valuesFile: values.yaml
    includeCRDs: true

# Chart 가 STS 의 persistentVolumeClaimRetentionPolicy 를 명시 안 함 →
# K8s default (whenDeleted: Delete, whenScaled: Delete). STS 삭제 시 PVC 도 같이 삭제.
# Loki 와 동일하게 Retain 으로 강제 (메트릭 무유실 보장).
patches:
  - path: patches/sts-retention.yaml
    target:
      kind: StatefulSet
      name: mimir-ingester
  - path: patches/sts-retention.yaml
    target:
      kind: StatefulSet
      name: mimir-store-gateway
  - path: patches/sts-retention.yaml
    target:
      kind: StatefulSet
      name: mimir-compactor
