# dev 전용 Prometheus 의 SA / ClusterRole / Binding.
# PrometheusOperator (monitoring/kps-operator) 가 cluster-wide 라
# monitoring-dev 의 Prometheus CR 도 자동 처리. SA + RBAC 는 직접 정의.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-dev
  namespace: monitoring-dev
---
# cluster-wide scrape 권한 (pods/nodes/endpoints/services)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-dev
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-dev
subjects:
  - kind: ServiceAccount
    name: prometheus-dev
    namespace: monitoring-dev
