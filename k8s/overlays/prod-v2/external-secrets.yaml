# prod-v2 — Phase 4/5 동안 옛 RDS/Redis 공유 (guardus/rds/prod/master, guardus/redis/prod/auth)
# Phase 6 cutover 시 v2 secret 으로 변경 예정 (guardus/rds/v2/master, guardus/redis/v2/auth).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: admin-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/prod/admin-api, property: ADMIN_KEY }
    - secretKey: STATS_KEY
      remoteRef: { key: guardus/prod/admin-api, property: STATS_KEY }
    # Cloudflare DNS 자동 관리 — dev 검증 후 prod 활성화 예정
    # - secretKey: CLOUDFLARE_API_TOKEN
    #   remoteRef: { key: guardus/cloudflare/api-token, property: token }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openresty-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: openresty-secrets
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/prod/admin-api, property: ADMIN_KEY }
    - secretKey: GUARDUS_BYPASS_KEY
      remoteRef: { key: guardus/prod/openresty, property: GUARDUS_BYPASS_KEY }
---
# RDS credentials — v2 RDS (guardus-prod-pg-v2 @ 2b) 로 cutover (Phase 6 step 2)
# 옛 RDS guardus-prod-pg-2a 가 source 였으나 promote 후 분리.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: guardus/rds/v2/master, property: username }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: guardus/rds/v2/master, property: password }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: guardus/rds/v2/master, property: jdbc_url }
---
# Redis credentials — v2 Redis (guardus-prod-redis-v2 @ 2b) 로 cutover (Phase 6)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
  data:
    - secretKey: SPRING_DATA_REDIS_URL
      remoteRef: { key: guardus/redis/v2/auth, property: url }
    - secretKey: REDIS_HOST
      remoteRef: { key: guardus/redis/v2/auth, property: host }
    - secretKey: REDIS_AUTH_TOKEN
      remoteRef: { key: guardus/redis/v2/auth, property: auth_token }
