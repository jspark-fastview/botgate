# Catch-all Ingress — 같은 ALB 공유 (group.name=guardus-shared-v2)
# admin host 외 모든 트래픽 → OpenResty 로 받음.
# OpenResty 가 channels DB 매칭 → upstream proxy. 매칭 안 되면 no_channel JSON.
# 채널 추가/제거 시 Ingress 변경 불필요 — admin UI 단일 입력.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guardus-ingress-catchall
  namespace: guardus
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/group.name: guardus-shared-v2
    # priority — host-specific rule (default order=0) 들보다 큰 값 = 낮은 우선순위.
    # ALB Controller 허용 범위 [-1000, 1000]. 최대값 1000 으로 마지막 priority.
    alb.ingress.kubernetes.io/group.order: '1000'
    alb.ingress.kubernetes.io/tags: Project=GuardUs,Cluster=v2,Type=catchall
spec:
  ingressClassName: alb
  rules:
    # host 생략 = catch-all (default rule)
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openresty
                port: { number: 80 }
