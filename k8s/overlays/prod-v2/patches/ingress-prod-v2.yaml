# prod-v2 Ingress patch — 새 ALB (group.name=guardus-shared-v2)
#
# admin host 만 명시. 모든 채널 트래픽은 ingress-catchall.yaml 의 default rule 으로 → OpenResty.
# 채널 추가/제거 시 K8s 변경 불필요 — admin UI 의 DB CRUD 만으로 효과.
- op: add
  path: /metadata/annotations/alb.ingress.kubernetes.io~1tags
  value: Project=GuardUs,Cluster=v2
- op: replace
  path: /metadata/annotations/alb.ingress.kubernetes.io~1group.name
  value: guardus-shared-v2
# 2026-05-25 spot interruption 사고 학습 — ALB access log + target deregister 단축.
# access_logs: 사고 시 request 별 reason 보존 (60일).
# deregistration_delay: 300s default → 30s (spot 회수 시 stale target routing 시간 ↓).
- op: add
  path: /metadata/annotations/alb.ingress.kubernetes.io~1load-balancer-attributes
  value: access_logs.s3.enabled=true,access_logs.s3.bucket=guardus-alb-access-logs
- op: add
  path: /metadata/annotations/alb.ingress.kubernetes.io~1target-group-attributes
  value: deregistration_delay.timeout_seconds=30
- op: replace
  path: /spec/rules
  value:
    # ── 운영 어드민 (frontend SPA 직접) — 명시적 host ─────
    - host: guardus-admin.viewus.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 3003 }
