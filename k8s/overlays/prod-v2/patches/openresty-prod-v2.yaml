# prod — 큰 리소스 + baseline 2대 1:1 매핑 (replicas=2) + on-demand baseline 100% 강제
- op: replace
  path: /spec/replicas
  value: 2
- op: replace
  path: /spec/template/spec/containers/0/resources/requests/cpu
  value: 200m
- op: replace
  path: /spec/template/spec/containers/0/resources/requests/memory
  value: 256Mi
- op: replace
  path: /spec/template/spec/containers/0/resources/limits/cpu
  value: 1000m
- op: replace
  path: /spec/template/spec/containers/0/resources/limits/memory
  value: 512Mi
# 채널 무중단 — baseline (on-demand) 우선, spot fallback 허용.
# preferred weight 100: baseline 가용 시 100% baseline. baseline 부족 / capacity 한도 시 spot 으로 자동.
# zone topologySpread 제거 (이전 1/3 baseline 만 schedule 된 원인).
- op: replace
  path: /spec/template/spec/affinity
  value:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: role
                operator: In
                values: [workload-baseline]
    podAntiAffinity:
      # host-spread — 다른 노드 분산 (HA)
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: openresty
            topologyKey: kubernetes.io/hostname
- op: remove
  path: /spec/template/spec/topologySpreadConstraints
