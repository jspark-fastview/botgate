# prod — 큰 리소스 + baseline 2대 1:1 매핑 (replicas=2) + on-demand baseline 100% 강제
- op: replace
  path: /spec/replicas
  value: 2
- op: replace
  path: /spec/template/spec/containers/0/resources/requests/cpu
  value: 200m
- op: replace
  path: /spec/template/spec/containers/0/resources/requests/memory
  value: 256Mi
- op: replace
  path: /spec/template/spec/containers/0/resources/limits/cpu
  value: 1000m
- op: replace
  path: /spec/template/spec/containers/0/resources/limits/memory
  value: 512Mi
# 채널 무중단 — baseline (on-demand) 노드 100% 강제. spot 회수 사고 시 영향 0.
# required: baseline 부족 시 pending 감수. replicas=3, baseline=2 라 host-spread preferred
# 로 두면 한 노드에 2 pod 가능 (또는 host-spread 위반 pending 1).
- op: replace
  path: /spec/template/spec/affinity
  value:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: role
                operator: In
                values: [workload-baseline]
    podAntiAffinity:
      # host-spread preferred (required 면 baseline 부족 시 더 pending)
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: openresty
            topologyKey: kubernetes.io/hostname
# zone topologySpread 제거 — 2 AZ 환경 (b/d) 에서 zone 1 죽으면 어차피 50% 영향.
# baseline 우선이 더 의도 충족 (spot 회수 보다 흔한 사고).
- op: remove
  path: /spec/template/spec/topologySpreadConstraints
