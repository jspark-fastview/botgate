# prod-v2 — guardus-eks-v2 cluster 전용 overlay.
# Phase 5 DNS canary 시점에 새 ALB 로 트래픽 전환.
# RDS/Redis 는 Phase 6 까지 옛 인프라 공유 (terraform-v2/iam.tf 의 SG ingress rule).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guardus

resources:
- ../../base
- external-secrets.yaml
- ingress-catchall.yaml

labels:
- pairs:
    guardus.io/cluster: v2
    guardus.io/env: prod

  # tag = commit SHA (CI bump). 옛 cluster (overlays/dev) 와 동일 SHA 시작.
  # CI 가 변경된 component 의 newTag 만 새 SHA 로 bump → ArgoCD auto-sync.
images:
- name: guardus/admin-api
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/admin-api
  # 2026-05-29: 채널 owner_id 기능 + Loki selector env 분리(prod=openresty 유지) (ada52cc). dev 검증 완료.
  # (이전 7dcf4a7 on-demand prewarm, 7a8e4f2 pool 1→4 포함)
  newTag: ada52ccda0ba0f53ff6ca9a0268fb895fc63f101
- name: guardus/frontend
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/frontend
  # 2026-05-29: progressive 대시보드 로딩 (615dbef). 로그아웃(f2a736e) 포함. dev 검증 후 promote.
  newTag: 615dbefefa87bb665c4521efe5356719e9fa7ec4
- name: guardus/internal-api
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/internal-api
  newTag: a4954decbc7aec4c4ce9558936cac364e669a76a
- name: guardus/openresty
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/openresty
  newTag: 3ebf1fc5c4100988a8394ae3728ac4d71a5a2ebd

  # 리소스 / replica — prod overlay 의 patches 사본 (kustomize root 밖 참조 불가)
  # Ingress — v2 전용 (group.name=guardus-shared-v2, 전체 채널 host)
  # admin-api / internal-api startup probe 연장 (새 cluster cold start 보완)
patches:
- path: patches/openresty-prod-v2.yaml
  target:
    kind: Deployment
    name: openresty
- path: patches/frontend-prod-v2.yaml
  target:
    kind: Deployment
    name: frontend
- path: patches/openresty-hpa-prod-v2.yaml
  target:
    kind: HorizontalPodAutoscaler
    name: openresty
- path: patches/ingress-prod-v2.yaml
  target:
    kind: Ingress
    name: guardus-ingress
- path: patches/startup-probe-v2.yaml
  target:
    kind: Deployment
    name: admin-api
- path: patches/startup-probe-v2.yaml
  target:
    kind: Deployment
    name: internal-api
