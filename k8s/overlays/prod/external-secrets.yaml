# prod — AWS Secrets Manager → K8s Secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: admin-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/prod/admin-api, property: ADMIN_KEY }
    - secretKey: STATS_KEY
      remoteRef: { key: guardus/prod/admin-api, property: STATS_KEY }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openresty-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: openresty-secrets
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/prod/admin-api, property: ADMIN_KEY }
    # env 명은 GUARDUS_BYPASS_KEY (헤더명만 X-Botgate-Bypass 로 유지 — Cloudflare WAF 의존)
    - secretKey: GUARDUS_BYPASS_KEY
      remoteRef: { key: guardus/prod/openresty, property: GUARDUS_BYPASS_KEY }
---
# RDS credentials — dev/prod 공유 (단일 인스턴스). prod 가는 시점에 별도 RDS 만들고 secret 분리 권장.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: guardus/rds/master, property: username }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: guardus/rds/master, property: password }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: guardus/rds/master, property: jdbc_url }
