# prod — 운영 도메인 (botgate-admin → guardus-admin)
- op: add
  path: /metadata/annotations/alb.ingress.kubernetes.io~1tags
  value: Project=GuardUs,Env=prod
- op: replace
  path: /spec/rules
  value:
    - host: guardus-admin.viewus.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openresty
                port: { number: 80 }
