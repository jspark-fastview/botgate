# AWS Secrets Manager → K8s Secret 자동 동기화
# 전제: External Secrets Operator + ClusterSecretStore 설치되어 있어야 함
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager     # ClusterSecretStore (platform 단계에서 생성)
    kind: ClusterSecretStore
  target:
    name: admin-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/dev/admin-api, property: ADMIN_KEY }
    - secretKey: STATS_KEY
      remoteRef: { key: guardus/dev/admin-api, property: STATS_KEY }
    # Cloudflare DNS 자동 관리 — 채널 CRUD 시 CNAME 자동 추가/삭제
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef: { key: guardus/cloudflare/api-token, property: token }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openresty-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: openresty-secrets
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/dev/admin-api, property: ADMIN_KEY }
    # env 명은 GUARDUS_BYPASS_KEY (헤더명만 X-Botgate-Bypass 로 유지 — Cloudflare WAF 의존)
    - secretKey: GUARDUS_BYPASS_KEY
      remoteRef: { key: guardus/dev/openresty, property: GUARDUS_BYPASS_KEY }
---
# Dev RDS credentials — guardus-prod-pg-dev (별도 db.t4g.micro)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: guardus/rds/dev/master, property: username }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: guardus/rds/dev/master, property: password }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: guardus/rds/dev/master, property: jdbc_url }
---
# Dev Redis credentials — guardus-prod-redis-dev (별도 cache.t4g.micro)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
  data:
    - secretKey: SPRING_DATA_REDIS_URL
      remoteRef: { key: guardus/redis/dev/auth, property: url }
    - secretKey: REDIS_HOST
      remoteRef: { key: guardus/redis/dev/auth, property: host }
    - secretKey: REDIS_AUTH_TOKEN
      remoteRef: { key: guardus/redis/dev/auth, property: auth_token }
