# AWS Secrets Manager → K8s Secret 자동 동기화
# 전제: External Secrets Operator + ClusterSecretStore 설치되어 있어야 함
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: admin-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager     # ClusterSecretStore (platform 단계에서 생성)
    kind: ClusterSecretStore
  target:
    name: admin-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/dev/admin-api, property: ADMIN_KEY }
    - secretKey: STATS_KEY
      remoteRef: { key: guardus/dev/admin-api, property: STATS_KEY }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openresty-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: openresty-secrets
  data:
    - secretKey: ADMIN_KEY
      remoteRef: { key: guardus/dev/admin-api, property: ADMIN_KEY }
    # env 명은 GUARDUS_BYPASS_KEY (헤더명만 X-Botgate-Bypass 로 유지 — Cloudflare WAF 의존)
    - secretKey: GUARDUS_BYPASS_KEY
      remoteRef: { key: guardus/dev/openresty, property: GUARDUS_BYPASS_KEY }
---
# RDS credentials — Terraform 이 만든 guardus/rds/master 에서 동기화.
# admin-api / internal-api 의 SPRING_DATASOURCE_* 환경변수로 매핑.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: guardus/rds/prod/master, property: username }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: guardus/rds/prod/master, property: password }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: guardus/rds/prod/master, property: jdbc_url }
