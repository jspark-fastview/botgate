apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guardus-dev

# bot-ingest-adapter — dev 전용 (검증 후 base 로 promote)
resources:
- ../../base
- external-secrets.yaml
- bot-ingest-adapter.yaml

# 환경 식별 label
labels:
- pairs:
    guardus.io/env: dev

# 이미지 — ECR 경로 + dev tag
images:
- name: guardus/admin-api
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/admin-api
  newTag: 7dcf4a7d62d054360581b7af8270d29f3d9084fa
- name: guardus/bot-ingest-adapter
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/bot-ingest-adapter
  newTag: 70d04735aecce0dc60e4213ed41b1f57791120b7
- name: guardus/frontend
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/frontend
  newTag: 615dbefefa87bb665c4521efe5356719e9fa7ec4
- name: guardus/internal-api
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/internal-api
  newTag: f2a736e89b79ff17ef36cf49056865a22f53e001
- name: guardus/openresty
  newName: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com/guardus/openresty
  newTag: f2a736e89b79ff17ef36cf49056865a22f53e001

# 환경별 패치
patches:
- path: patches/openresty-dev.yaml
  target:
    kind: Deployment
    name: openresty
- path: patches/frontend-dev.yaml
  target:
    kind: Deployment
    name: frontend
- path: patches/ingress-dev.yaml
  target:
    kind: Ingress
    name: guardus-ingress
