# dev — 별도 도메인 (예: guardus-fv-dev.viewus.co)
- op: add
  path: /metadata/annotations/alb.ingress.kubernetes.io~1tags
  value: Project=GuardUs,Env=dev
- op: replace
  path: /spec/rules
  value:
    - host: guardus-fv-dev.viewus.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openresty
                port: { number: 80 }
