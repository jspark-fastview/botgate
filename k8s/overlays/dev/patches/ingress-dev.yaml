# dev 환경 Ingress — 같은 ALB (group.name=guardus-shared-v2) 공유
# host 만 다르게: guardus-admin-dev.viewus.co
# 채널 트래픽은 받지 않음 — admin UI 만 dev 분리
- op: add
  path: /metadata/annotations/alb.ingress.kubernetes.io~1tags
  value: Project=GuardUs,Cluster=v2
- op: replace
  path: /metadata/annotations/alb.ingress.kubernetes.io~1group.name
  value: guardus-shared-v2
- op: replace
  path: /spec/rules
  value:
    - host: guardus-admin-dev.viewus.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 3003 }
