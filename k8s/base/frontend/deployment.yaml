apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: guardus
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: guardus/frontend:latest
          ports:
            - name: http
              containerPort: 3003
          env:
            - name: API_URL
              value: http://admin-api.guardus.svc.cluster.local:3002
            - name: NODE_ENV
              value: production
          resources:
            requests: { cpu: 50m,  memory: 96Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
