apiVersion: apps/v1
kind: Deployment
metadata:
  name: openresty
  labels:
    app.kubernetes.io/name: openresty
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: guardus
spec:
  # OpenResty 는 stateless — 다중 replica 가능 (각 워커 shared_dict 는 격리되지만 OK)
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # IP spike 0 — ENI mode Cilium IPAM 에서 새 pod 가 옛 pod 죽기 전에 안 띄움.
      # 4 deployment 동시 sync 시 IPAM 포화 사고 (2026-05-18) 방지.
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openresty
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openresty
        app.kubernetes.io/component: gateway
    spec:
      # admin-api/internal-api 와 다른 노드 분산 (anti-affinity 약하게)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: openresty
                topologyKey: kubernetes.io/hostname
      # AZ + 노드 분산 — Spot 1 AZ 사망 시 다른 AZ pod 생존
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openresty
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openresty
      # baseline NG taint 통과 — baseline 노드를 openresty 전용으로 만듦.
      # taint: role=openresty:NoSchedule (terraform-v2/eks.tf baseline NG).
      # openresty 만 toleration 보유 → baseline 노드에 schedule.
      # 다른 워크로드 (admin-api/argocd/mimir/etc) 는 taint 못 견뎌서 workload NG 로 자동 이동.
      # 2026-05-28: ArgoCD application-controller 가 baseline 92% 차지하는 사고 학습.
      tolerations:
        - key: role
          operator: Equal
          value: openresty
          effect: NoSchedule
      # graceful shutdown — preStop (35s) + nginx quit + 여유. 2026-05-25 spot interruption 사고 학습.
      terminationGracePeriodSeconds: 90
      containers:
        - name: openresty
          image: guardus/openresty:latest
          ports:
            - name: http
              containerPort: 80
            - name: metrics
              containerPort: 9145
          env:
            - name: INTERNAL_API_HOST
              value: internal-api.guardus.svc.cluster.local
            - name: INTERNAL_API_PORT
              value: "3001"
            - name: ADMIN_API_HOST
              value: admin-api.guardus.svc.cluster.local
            - name: ADMIN_API_PORT
              value: "3002"
          envFrom:
            - secretRef:
                name: openresty-secrets   # ADMIN_KEY, BOTGATE_BYPASS_KEY
            # Redis 자격증명 — channels.lua 가 admin-api 결합도 분리 위해 Redis 직접 GET
            - secretRef:
                name: redis-credentials
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 256Mi }
          # liveness: 단순 OpenResty 살아있는지 (channels cache 무관)
          livenessProbe:
            httpGet: { path: /, port: http, httpHeaders: [ { name: Host, value: healthz } ] }
            initialDelaySeconds: 10
            periodSeconds: 10
          # readiness: channels cache 채워져야만 ready → cold start 트래픽 차단
          # 새 pod 은 prefetch_admin_data 가 admin-api 에서 fetch 완료 후만 ALB target 등록.
          readinessProbe:
            httpGet: { path: /_internal/readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 30   # 90s 까지 prefetch 기다림 (admin-api cold start 보완)
            successThreshold: 1
          # Graceful shutdown — ALB deregistration_delay (Ingress annotation 30s) 동안
          # 새 connection 안 받으면서 기존 요청 처리. SIGTERM 즉시 nginx -s quit 하면
          # ALB 가 아직 stale target 으로 routing → connection refused (5xx).
          # 2026-05-25 사고 학습: NTH (graceful drain) + preStop sleep + ALB deregister 빠르게.
          lifecycle:
            preStop:
              exec:
                # 1) sleep 35s — ALB deregister 까지 (30s) 새 connection 차단
                # 2) nginx -s quit — graceful (기존 요청 처리 후 종료)
                command: ["/bin/sh", "-c", "sleep 35 && /usr/local/openresty/bin/openresty -s quit"]
