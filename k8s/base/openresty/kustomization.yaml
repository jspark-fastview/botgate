apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  # hpa.yaml 제거 — KEDA ScaledObject 가 HPA 자동 생성 (keda-hpa-openresty).
  # 둘 다 두면 같은 Deployment 를 두 HPA 가 fight → 충돌.
