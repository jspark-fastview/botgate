apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-api
  labels:
    app.kubernetes.io/name: internal-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: guardus
spec:
  # RDS 이관 후 replicas 2. SQLite PVC 의존 사라짐 → podAffinity 제거.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: internal-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: internal-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: internal-api
      # 2 replicas — 노드 분산
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: internal-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: internal-api
          image: guardus/internal-api:latest
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: org.postgresql.Driver
            - name: DB_POOL_MAX
              value: "10"
            - name: DB_POOL_MIN
              value: "2"
            - name: OTEL_SERVICE_NAME
              value: internal-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc:4317
          envFrom:
            # RDS 접속 정보 (admin-api 와 공유)
            - secretRef:
                name: rds-credentials
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
          livenessProbe:
            httpGet: { path: /actuator/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet: { path: /actuator/health, port: http }
            periodSeconds: 5
            failureThreshold: 12
