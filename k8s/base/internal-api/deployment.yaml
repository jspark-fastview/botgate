apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-api
  labels:
    app.kubernetes.io/name: internal-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: guardus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: internal-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: internal-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: internal-api
      # SQLite PVC 가 ReadWriteOnce 이므로 admin-api 와 같은 노드에 스케줄
      # (제한 — 추후 RDS 이관 시 affinity 제거)
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: admin-api
              topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: internal-api
          image: guardus/internal-api:latest
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: OTEL_SERVICE_NAME
              value: internal-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc:4317
            - name: SPRING_DATASOURCE_URL
              value: jdbc:sqlite:/app/data/botgate.db
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "1"
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
          livenessProbe:
            httpGet: { path: /actuator/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet: { path: /actuator/health, port: http }
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: guardus-db        # admin-api 와 동일 PVC 공유 (같은 SQLite)
