apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-api-env
data:
  WEB_DIR: /app/web
  OPENRESTY_HOST: openresty.guardus.svc.cluster.local
  OPENRESTY_PORT: "80"
  # SPRING_DATASOURCE_URL / USERNAME / PASSWORD 는 rds-credentials Secret 에서.
  # SPRING_DATASOURCE_DRIVER_CLASS_NAME / DB_POOL_* 는 Deployment env 직접.
