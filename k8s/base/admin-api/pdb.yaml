apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-api
spec:
  # replicas=2 — 동시 1개 이하만 disruption 허용. voluntary drain (node upgrade)
  # 시 PDB 준수. Spot unvoluntary 는 막을 수 없지만 topologySpread 가 위험 분산.
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-api
