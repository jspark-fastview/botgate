apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  labels:
    app.kubernetes.io/name: admin-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: guardus
spec:
  # RDS 이관 후 replicas 2+. SQLite 단일 writer 제약 풀림.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: admin-api          # Pod Identity 용
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      # 2 replicas 분산 — 같은 노드 회피 (soft)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: admin-api
                topologyKey: kubernetes.io/hostname
      # AZ + 노드 분산 — Spot interruption 1 AZ 동시 사망해도 다른 AZ 의 pod 생존.
      # ScheduleAnyway: 노드 부족 시 강제 schedule (preferred 와 비슷한 효과).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: admin-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: admin-api
      containers:
        - name: admin-api
          image: guardus/admin-api:latest    # overlay 에서 ECR 경로로 patch
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "3002"
            # Postgres + Flyway 모드 (Postgres JDBC driver 사용)
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: org.postgresql.Driver
            - name: FLYWAY_ENABLED
              value: "true"
            # Loki 통합 (access_logs 쿼리)
            - name: LOKI_URL
              value: http://loki.monitoring.svc:3100
            - name: DB_POOL_MAX
              value: "10"
            - name: DB_POOL_MIN
              value: "2"
            - name: DB_INIT_SQL
              value: ""    # Postgres 는 PRAGMA 필요 없음
            # Redis 캐시 활성 (CacheConfig 가 이 값 보고 RedisCacheManager 선택)
            - name: GUARDUS_REDIS_ENABLED
              value: "true"
            # Stats prewarm — 일시 비활성.
            # 이유: admin-api 시작 30s 시점 self-HTTP 호출이 Loki cold-call timeout 발생 시
            #       빈 응답 → @Cacheable 가 Redis 에 negative cache (70m TTL) → portal KPI 0.
            # 재활성하기 전: initialDelay 늘리거나 unless 조건으로 0/empty 응답은 cache 안 하도록 fix 필요.
            - name: GUARDUS_PREWARM_ENABLED
              value: "false"
            # OTEL
            - name: OTEL_SERVICE_NAME
              value: admin-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=base"
          envFrom:
            - configMapRef:
                name: admin-api-env
            - secretRef:
                name: admin-api-secrets
            # RDS 접속 정보: SPRING_DATASOURCE_URL / USERNAME / PASSWORD
            - secretRef:
                name: rds-credentials
            # Redis: SPRING_DATA_REDIS_URL / REDIS_HOST / REDIS_AUTH_TOKEN
            - secretRef:
                name: redis-credentials
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:                    # JVM 부팅 + Flyway migrate 시간 확보 (60s)
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          # web/ SPA 정적 파일은 admin-api 이미지에 빌드인 (Dockerfile COPY web)
          # 기존 web-static-placeholder ConfigMap 마운트는 빈 디렉토리로 가려서 제거.
