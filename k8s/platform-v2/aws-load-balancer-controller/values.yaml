# AWS Load Balancer Controller v2 — guardus-eks-v2 cluster 전용
# 인증: EKS Pod Identity (Terraform terraform-v2/iam.tf 의 aws_lb_controller association)
clusterName: guardus-eks-v2
region: ap-northeast-2

# Webhook cert 를 cert-manager 가 발급 (chart 자체 self-signed 대신).
# 두 replica 사이 cert 불일치로 TLS handshake error 사고 (2026-05-20) 방지.
enableCertManager: true

serviceAccount:
  create: true
  name: aws-load-balancer-controller

replicaCount: 2

serviceMonitor:
  enabled: true
  namespace: monitoring

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 500Mi
