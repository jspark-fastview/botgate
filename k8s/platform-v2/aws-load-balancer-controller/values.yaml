# AWS Load Balancer Controller v2 — guardus-eks-v2 cluster 전용
# 인증: EKS Pod Identity (Terraform terraform-v2/iam.tf 의 aws_lb_controller association)
clusterName: guardus-eks-v2
region: ap-northeast-2

# cert-manager 자체가 stale 상태 (옛 cluster 사고 여파) 라 enableCertManager 미사용.
# chart 의 self-signed cert 모드 (default). 새 Ingress 만들 일 없으면 운영 무관.
# 영구 fix 는 cert-manager 재install 필요 (위험 작업, 별도).

serviceAccount:
  create: true
  name: aws-load-balancer-controller

replicaCount: 2

serviceMonitor:
  enabled: true
  namespace: monitoring

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 500Mi
