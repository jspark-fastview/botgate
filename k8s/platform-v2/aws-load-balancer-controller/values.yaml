# AWS Load Balancer Controller v2 — guardus-eks-v2 cluster 전용
# 인증: EKS Pod Identity (Terraform terraform-v2/iam.tf 의 aws_lb_controller association)
clusterName: guardus-eks-v2
region: ap-northeast-2

# Webhook cert 를 cert-manager 가 발급 — chart self-signed 모드의 replica 간 mismatch 사고 (2026-05-20) 방지.
# cert-manager 재install 후 활성화 (2026-05-20).
enableCertManager: true

serviceAccount:
  create: true
  name: aws-load-balancer-controller

replicaCount: 2

serviceMonitor:
  enabled: true
  namespace: monitoring

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 500Mi

# 2026-05-28: Karpenter 노드 secondary ENI SNAT 이슈로 외부 API 도달 불가.
# Cilium ENI mode + Karpenter 의 multi-ENI 가 mngd 와 다른 구조 → ebs-csi/ALB controller CrashLoop.
# 해결: mngd 노드만 schedule (karpenter.sh/nodepool 라벨 없는 노드).
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist
# baseline NG 의 openresty taint 통과 위해 toleration. 단 ALB controller 는 baseline 노드 X 가도록
# 별도 affinity 안 함 (default = workload-baseline 도 OK 단 capacity 작아 schedule 실패할 가능성).
tolerations:
  - key: role
    operator: Equal
    value: openresty
    effect: NoSchedule
