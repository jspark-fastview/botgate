# Karpenter chart v2 — guardus-eks-v2 cluster 전용
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: karpenter

helmCharts:
  - name: karpenter
    repo: oci://public.ecr.aws/karpenter
    # 2026-05-28: 1.0.6 → 1.12.1
    # 원인: 1.0.6 이 K8s 1.34 호환 안 됨 ("karpenter version is not compatible with K8s version 1.34")
    # 증상: NodeClaim launch 는 하지만 launched 노드가 cluster 에 register 안 됨 (12분 째 stuck).
    # v1.x API 동일 (NodePool/EC2NodeClass karpenter.sh/v1) — values 호환.
    version: "1.12.1"
    releaseName: karpenter
    namespace: karpenter
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - ec2nodeclass.yaml
  - nodepool.yaml
  - rbac-extra.yaml
