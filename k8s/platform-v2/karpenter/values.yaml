# Karpenter controller v2 — guardus-eks-v2 전용
settings:
  clusterName: guardus-eks-v2
  interruptionQueue: Karpenter-guardus-eks-v2
  batchMaxDuration: 10s
  batchIdleDuration: 1s

controller:
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: guardus.io/provisioner
              operator: DoesNotExist

# 2026-05-29: chart default 가 zone topologySpread DoNotSchedule 라
# karpenter 2 replica 가 mngd 노드 (baseline taint 회피 + Karpenter 노드 회피) 환경에서
# 같은 zone 2 pod 못 띄움 → 1 pod 영구 Pending. ScheduleAnyway 로 완화 (HA 유지, 강제 X).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway

serviceAccount:
  create: true
  name: karpenter

logLevel: info

replicas: 2

podDisruptionBudget:
  name: karpenter
  maxUnavailable: 1
