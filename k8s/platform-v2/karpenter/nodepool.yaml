# NodePool v2 — guardus-eks-v2 cluster 전용 (b/d AZ only)
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        guardus.io/provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind:  EC2NodeClass
        name:  default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - t4g
            - c6g
            - c7g
            - m6g
            - m7g
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["medium", "large", "xlarge", "2xlarge"]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4", "8"]
        - key: topology.kubernetes.io/zone
          operator: In
          # v2 cluster 는 b/d 만 (2c IP 부족 회피, 2a segregation)
          values:
            - ap-northeast-2b
            - ap-northeast-2d

      expireAfter: 720h

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
    budgets:
      - nodes: "10%"
      - nodes: "0"
        schedule: "0 9 * * mon-fri"
        duration: 8h

  weight: 100

  limits:
    cpu: 100
    memory: 200Gi
