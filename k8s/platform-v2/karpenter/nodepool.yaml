# NodePool v2 — guardus-eks-v2 cluster 전용 (b/d AZ only)
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        guardus.io/provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind:  EC2NodeClass
        name:  default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        # 2026-05-28: Karpenter 1.12 가 `karpenter.k8s.aws/*` 도메인 라벨을 restricted 로 처리.
        # 기존 instance-family / instance-size / instance-cpu 라벨 사용 시 NodeClaim invalid.
        # 대체: K8s native `node.kubernetes.io/instance-type` 으로 명시적 list.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            # t4g (burstable, baseline 용)
            - t4g.medium
            - t4g.large
            - t4g.xlarge
            - t4g.2xlarge
            # c6g / c7g (compute optimized)
            - c6g.large
            - c6g.xlarge
            - c6g.2xlarge
            - c7g.large
            - c7g.xlarge
            - c7g.2xlarge
            # m6g / m7g (general purpose)
            - m6g.large
            - m6g.xlarge
            - m6g.2xlarge
            - m7g.large
            - m7g.xlarge
            - m7g.2xlarge
        - key: topology.kubernetes.io/zone
          operator: In
          # v2 cluster 는 b/d 만 (2c IP 부족 회피, 2a segregation)
          values:
            - ap-northeast-2b
            - ap-northeast-2d

      expireAfter: 720h

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
    budgets:
      - nodes: "10%"
      - nodes: "0"
        schedule: "0 9 * * mon-fri"
        duration: 8h

  weight: 100

  limits:
    cpu: 100
    memory: 200Gi
