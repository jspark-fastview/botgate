# EC2NodeClass v2 — guardus-eks-v2 cluster 전용
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # 2026-05-29: AL2023 → Bottlerocket 되돌림.
  # 근본 원인 추적: AL2023 노드의 secondary CIDR ENI (100.64.x) pod 가 Cilium ENI mode 에서
  # cross-node 통신 broken (argocd-repo→redis timeout, mimir→S3 timeout 등).
  # mngd 노드 (Bottlerocket 1.61.0) 의 secondary CIDR ENI pod 는 정상 → Bottlerocket 이 호환.
  # 이전 "Bottlerocket join 실패" 의 진짜 원인은 public IP 누락 (associatePublicIPAddress)
  # 이었고 AL2023 무관 — public IP fix 했으니 Bottlerocket 도 join 정상 예상.
  amiFamily: Bottlerocket
  amiSelectorTerms:
    - alias: bottlerocket@latest

  # Terraform terraform-v2/karpenter.tf 가 만든 node IAM role
  # (terraform output karpenter_node_iam_role_name)
  role: "Karpenter-guardus-eks-v2-20260519051555903200000016"

  # Subnet discovery — terraform-v2/vpc.tf 가 b/d subnet 에 guardus-eks-v2 tag 부여
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: guardus-eks-v2

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: guardus-eks-v2

  tags:
    Name: guardus-eks-v2-karpenter-node
    Component: karpenter
    karpenter.sh/discovery: guardus-eks-v2

  # Bottlerocket — Karpenter 가 cluster-dns/CA userdata 생성. maxPods Cilium ENI mode 매칭.
  # mngd NG (Bottlerocket) 와 동일 설정 → 같은 정상 동작.
  kubelet:
    clusterDNS:
      - "10.100.0.10"
    maxPods: 35

  # 2026-05-28: EKS API endpoint = public-only (PrivateAccess=false).
  # mngd NG 는 launch_template 에 associate_public_ip_address=true 라 join OK.
  # Karpenter 는 default false → public IP 없음 → 인터넷 차단 → EKS API 도달 불가 → join 실패.
  associatePublicIPAddress: true
