# EC2NodeClass v2 — guardus-eks-v2 cluster 전용
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # 2026-05-28: Bottlerocket → AL2023.
  # 원인: Karpenter 1.12.1 의 Bottlerocket userdata 가 K8s 1.34 cluster join 못 함
  # (EC2 launch 됐지만 kubelet 시작 안 됨, NodeClaim Ready=Unknown 5분+).
  # mngd NG 의 Bottlerocket 노드는 EKS 가 직접 userdata 관리해서 join OK.
  # AL2023 = EKS 권장 AMI, Karpenter 1.12 와 더 안정적 호환.
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest

  # Terraform terraform-v2/karpenter.tf 가 만든 node IAM role
  # (terraform output karpenter_node_iam_role_name)
  role: "Karpenter-guardus-eks-v2-20260519051555903200000016"

  # Subnet discovery — terraform-v2/vpc.tf 가 b/d subnet 에 guardus-eks-v2 tag 부여
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: guardus-eks-v2

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: guardus-eks-v2

  tags:
    Name: guardus-eks-v2-karpenter-node
    Component: karpenter
    karpenter.sh/discovery: guardus-eks-v2

  # AL2023 는 EKS 가 cluster-dns/cluster-CA 등 자동 inject (kubelet config drop-in).
  # maxPods 만 Cilium ENI mode 매칭 (vpc-cni default 다름).
  kubelet:
    maxPods: 35

  # 2026-05-28: EKS API endpoint = public-only (PrivateAccess=false).
  # mngd NG 는 launch_template 에 associate_public_ip_address=true 라 join OK.
  # Karpenter 는 default false → public IP 없음 → 인터넷 차단 → EKS API 도달 불가 → join 실패.
  associatePublicIPAddress: true
