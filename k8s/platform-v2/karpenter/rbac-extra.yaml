# Karpenter chart 1.0.6 의 default ClusterRole 에 누락된 권한 추가 (v2 cluster 동일 적용)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karpenter-extra
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karpenter-extra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: karpenter-extra
subjects:
  - kind: ServiceAccount
    name: karpenter
    namespace: karpenter
