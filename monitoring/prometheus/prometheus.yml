global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: guardus-ec2

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: admin-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['admin-api:3002']
        labels: { service: admin-api }

  - job_name: internal-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['internal-api:3001']
        labels: { service: internal-api }

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
