# Promtail — Docker stdout → Loki
# OpenResty JSON 로그는 추가 파이프라인으로 필드 추출
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
    pipeline_stages:
      # OpenResty JSON 액세스 로그만 필드 파싱
      - match:
          selector: '{container="botgate-openresty-1"}'
          stages:
            - json:
                expressions:
                  status:        status
                  host:          host
                  ua:            ua
                  uri:           uri
                  method:        method
                  bytes:         bytes
                  req_time:      req_time
                  upstream_time: upstream_time
                  bot_verified:  x_bot_verified
                  ip:            ip
            # 정수 status 를 라벨로 (저카디널리티)
            - labels:
                status:
                method:
                host:
                bot_verified:
            # 메시지 timestamp 는 ts 사용 시 충돌 가능 — 그대로 둠
