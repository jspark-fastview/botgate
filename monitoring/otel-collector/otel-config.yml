# OpenTelemetry Collector — Spring Boot 앱이 OTLP로 보내고
# Tempo(트레이스) / Loki(로그)로 라우팅
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: cluster
        value: guardus-ec2
        action: upsert

exporters:
  # 트레이스 → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # 로그 → Loki (HTTP push)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  # 디버그용 (필요 시 활성화)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch, resource]
      exporters:  [otlp/tempo]
    logs:
      receivers:  [otlp]
      processors: [batch, resource]
      exporters:  [otlphttp/loki]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
