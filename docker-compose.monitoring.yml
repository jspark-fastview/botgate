# 모니터링 스택 — Loki / Tempo / Prometheus / Grafana / OTel Collector / Promtail
# 기동: docker compose -p monitoring -f docker-compose.monitoring.yml --env-file .env up -d
# 중단: docker compose -p monitoring -f docker-compose.monitoring.yml down
#
# Grafana 접근: SSH 터널 (외부 노출 없음)
#   ssh -L 3000:localhost:3000 ubuntu@13.125.250.55
#   브라우저: http://localhost:3000  (admin / GRAFANA_ADMIN_PASSWORD)
name: monitoring

services:
  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks: [monitoring]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  tempo:
    image: grafana/tempo:2.6.1
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks: [monitoring]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:v3.0.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
      - botgate_default       # admin-api/internal-api 메트릭 스크레이프용
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: --config=/etc/otelcol/config.yaml
    volumes:
      - ./monitoring/otel-collector/otel-config.yml:/etc/otelcol/config.yaml:ro
    networks:
      - monitoring
      - botgate_default       # 앱이 OTLP push 하는 진입점
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # cAdvisor — 컨테이너별 CPU/메모리/네트워크 메트릭
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    command:
      - --housekeeping_interval=15s
      - --docker_only=true
      - --disable_metrics=disk,referenced_memory,udp,tcp,sched,hugetlb,resctrl,advtcp,process
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks: [monitoring]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # node-exporter — 호스트(EC2) CPU/메모리/디스크/네트워크
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [monitoring]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  promtail:
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [monitoring]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"   # ALB → grafana.viewus.co 로 공개 (Grafana 자체 admin 인증으로 보호)
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana-guardus.viewus.co
      - GF_SERVER_DOMAIN=grafana-guardus.viewus.co
      - GF_USERS_DEFAULT_LANGUAGE=ko-KR
      - GF_DATE_FORMATS_USE_BROWSER_LOCALE=true
      - GF_INSTALL_PLUGINS=
    networks: [monitoring]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
  botgate_default:
    external: true
    name: botgate_default
