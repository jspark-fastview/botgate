name: Build → ECR → GitOps bump

# 트리거: main 푸시 시 변경된 컴포넌트만 빌드
# 흐름:
#   1. OIDC 로 AWS 인증 (long-lived key 불필요)
#   2. 변경된 컴포넌트 감지
#   3. buildx 로 멀티아키 (arm64) 빌드 + ECR 푸시
#   4. kustomization.yaml 의 image tag bump (dev overlay) → 같은 레포에 커밋
#   5. ArgoCD 가 폴링으로 sync → 자동 배포

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: '모든 컴포넌트 빌드 (paths-filter 무시)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'admin-api/**'
      - 'internal-api/**'
      - 'openresty/**'
      - 'frontend/**'
      - 'bot-ingest-adapter/**'
      - 'k8s/**'
      - '.github/workflows/build-push-ecr.yml'

# OIDC for AWS
permissions:
  id-token: write
  contents: write   # kustomization.yaml 커밋용

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 124052247302.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  detect:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      admin-api:         ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.admin-api }}
      internal-api:      ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.internal-api }}
      openresty:         ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.openresty }}
      frontend:          ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.frontend }}
      bot-ingest-adapter: ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.bot-ingest-adapter }}
    steps:
      - uses: actions/checkout@v4
      - id: force
        run: echo "all=${{ inputs.force_all || 'false' }}" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin-api:
              - 'admin-api/**'
            internal-api:
              - 'internal-api/**'
            openresty:
              - 'openresty/**'
            frontend:
              - 'frontend/**'
            bot-ingest-adapter:
              - 'bot-ingest-adapter/**'

  build:
    name: Build ${{ matrix.component }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: admin-api
            context: ./admin-api
            changed: ${{ needs.detect.outputs.admin-api }}
          - component: internal-api
            context: ./internal-api
            changed: ${{ needs.detect.outputs.internal-api }}
          - component: openresty
            context: ./openresty
            changed: ${{ needs.detect.outputs.openresty }}
          - component: frontend
            context: ./frontend
            changed: ${{ needs.detect.outputs.frontend }}
          - component: bot-ingest-adapter
            context: ./bot-ingest-adapter
            changed: ${{ needs.detect.outputs.bot-ingest-adapter }}
    if: ${{ needs.detect.outputs.admin-api == 'true' || needs.detect.outputs.internal-api == 'true' || needs.detect.outputs.openresty == 'true' || needs.detect.outputs.frontend == 'true' || needs.detect.outputs.bot-ingest-adapter == 'true' }}
    steps:
      - name: Skip if unchanged
        if: matrix.changed != 'true'
        run: echo "::notice ::${{ matrix.component }} 변경 없음 — skip" && exit 0

      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Configure AWS via OIDC
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::124052247302:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: matrix.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      # admin-api: SPA 정적 파일 (web/) 을 build context 안으로 복사
      # Docker build context 외부 (../web) 접근 불가라 이렇게 우회.
      - name: Copy web/ into admin-api context
        if: matrix.changed == 'true' && matrix.component == 'admin-api'
        run: cp -r web admin-api/web

      - name: Build & push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64       # t4g (Graviton) 노드 대상
          push: true
          # 2026-05-29: :dev 고정 태그 제거 — ECR repository 가 IMMUTABLE 이라
          # :dev 재push 시 "tag already exists, immutable" 로 build 실패.
          # deploy (overlay kustomization) 는 SHA 태그만 사용 → :dev 불필요.
          tags: ${{ env.ECR_REGISTRY }}/guardus/${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to:   type=gha,scope=${{ matrix.component }},mode=max

  bump:
    name: Bump image tags (GitOps — dev + prod-v2)
    needs: [detect, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    env:
      CHG_ADMIN: ${{ needs.detect.outputs.admin-api }}
      CHG_INTERNAL: ${{ needs.detect.outputs.internal-api }}
      CHG_OPENRESTY: ${{ needs.detect.outputs.openresty }}
      CHG_FRONTEND: ${{ needs.detect.outputs.frontend }}
      CHG_BOTINGEST: ${{ needs.detect.outputs.bot-ingest-adapter }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tags in overlays (dev only — prod 는 수동 promote)
        run: |
          # CLAUDE.md 환경 분리 규칙: 신규 기능 dev 에서 먼저 검증.
          # prod-v2 는 수동 promote — dev 충분히 검증 후 별도 PR/commit 으로 SHA 갱신.
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/

          bump() {
            local c="$1"
            (cd k8s/overlays/dev      && kustomize edit set image guardus/$c=${ECR_REGISTRY}/guardus/$c:${GITHUB_SHA})
            echo "  bumped: $c (dev)"
          }
          [ "$CHG_ADMIN"     = "true" ] && bump admin-api    || echo "  skip: admin-api 변경 없음"
          [ "$CHG_INTERNAL"  = "true" ] && bump internal-api || echo "  skip: internal-api 변경 없음"
          [ "$CHG_OPENRESTY" = "true" ] && bump openresty    || echo "  skip: openresty 변경 없음"
          [ "$CHG_FRONTEND"  = "true" ] && bump frontend     || echo "  skip: frontend 변경 없음"
          [ "$CHG_BOTINGEST" = "true" ] && bump bot-ingest-adapter || echo "  skip: bot-ingest-adapter 변경 없음"

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "변경 없음 — skip"
            exit 0
          fi
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci: bump dev image tags to ${GITHUB_SHA::7}"
          # race condition (다른 commit 이 거의 동시에 들어와서 push reject) 대응: rebase + 재시도
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push reject — pull --rebase 후 재시도 ($i/5)"
            git pull --rebase origin main
            sleep $((i * 2))
          done
          echo "push 5회 실패 — abort"
          exit 1
