name: Deploy → Dev EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_DEPLOY_PATH }}

            echo "▶ git pull"
            git pull origin main

            # ── 1. 신규 스택 먼저 (admin-api/internal-api/frontend) ────────
            # OpenResty 가 startup 시 admin-api 채널/정책을 fetch 하므로 admin-api 가 먼저 healthy 해야
            # cold start 시 cache miss → no_channel 폭주 방지
            echo "▶ guardus-new 빌드"
            docker compose -p guardus-new -f docker-compose.new-stack.yml --env-file .env build

            echo "▶ guardus-new 재시작"
            docker compose -p guardus-new -f docker-compose.new-stack.yml --env-file .env up -d

            echo "▶ admin-api 헬스체크 (필수 — OpenResty 의존성)"
            for i in $(seq 1 24); do
              sleep 5
              curl -sf http://localhost:3002/actuator/health | grep -q '"status":"UP"' && break
              echo "  대기중... (${i}/24)"
              [ $i -eq 24 ] && { echo "admin-api 기동 timeout"; exit 1; }
            done
            curl -sf http://localhost:3003 > /dev/null

            # ── 2. OpenResty (admin-api healthy 확인 후) ────────────────────
            echo "▶ openresty 빌드"
            docker compose -f docker-compose.prod.yml --env-file .env build openresty

            echo "▶ openresty 재시작"
            docker compose -f docker-compose.prod.yml --env-file .env up -d --no-deps --remove-orphans openresty

            echo "▶ openresty 헬스체크"
            sleep 3
            curl -sf http://localhost/health 2>/dev/null || curl -sf http://localhost/ > /dev/null

            # ── 3. 모니터링 스택 ───────────────────────────────────────────
            echo "▶ monitoring 스택 기동"
            docker compose -p monitoring -f docker-compose.monitoring.yml --env-file .env up -d

            echo "✅ 배포 완료"
