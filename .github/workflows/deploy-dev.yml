name: Deploy → Dev EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_DEPLOY_PATH }}

            echo "▶ git pull"
            git pull origin main

            echo "▶ docker compose build"
            docker compose build token-api

            echo "▶ docker compose up"
            docker compose up -d

            echo "▶ health check"
            sleep 3
            curl -sf http://localhost:3000/health | grep -q '"ok":true'
            echo "✅ 배포 완료"
