name: Deploy → Dev EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_DEPLOY_PATH }}

            echo "▶ git pull"
            git pull origin main

            # ── 기존 스택 (openresty + token-api) ─────────────────────────
            echo "▶ 기존 스택 빌드"
            docker compose -f docker-compose.prod.yml --env-file .env build openresty token-api

            echo "▶ 기존 스택 재시작"
            docker compose -f docker-compose.prod.yml --env-file .env up -d --no-deps openresty token-api

            echo "▶ health check (기존)"
            sleep 3
            curl -sf http://localhost:3000/health | grep -q '"ok":true'

            # ── 신규 스택 (internal-api + admin-api + frontend) ────────────
            echo "▶ guardus-new 빌드"
            docker compose -p guardus-new -f docker-compose.new-stack.yml --env-file .env build

            echo "▶ guardus-new 재시작"
            docker compose -p guardus-new -f docker-compose.new-stack.yml --env-file .env up -d

            echo "▶ health check (신규)"
            for i in $(seq 1 24); do
              sleep 5
              curl -sf http://localhost:3002/actuator/health | grep -q '"status":"UP"' && break
              echo "  대기중... (${i}/24)"
              [ $i -eq 24 ] && { echo "admin-api 기동 timeout"; exit 1; }
            done
            curl -sf http://localhost:3003 > /dev/null

            echo "✅ 배포 완료"
