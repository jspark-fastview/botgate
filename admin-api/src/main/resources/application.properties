server.port=3002
spring.application.name=admin-api

# ── DataSource ──────────────────────────────────────────────────────
# 기본은 SQLite (EC2 환경). K8s 는 env (SPRING_DATASOURCE_URL 등) 으로 override.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:/app/data/botgate.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# HikariCP — SQLite 1 / Postgres 10 (env 로 조절)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:1}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-init-sql=${DB_INIT_SQL:PRAGMA busy_timeout=5000}
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ── Schema management ──────────────────────────────────────────────
# SQLite (EC2): token-api 가 schema.js 로 관리. Flyway/schema.sql 둘 다 OFF.
# Postgres (K8s): Flyway 가 V1__init.sql 자동 실행 (FLYWAY_ENABLED=true env 로 켜기).
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.sql.init.mode=${SCHEMA_INIT_MODE:never}
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql

# OTEL exporter — collector 없는 환경 default OFF
otel.logs.exporter=none
otel.traces.exporter=none

# Actuator + Prometheus 메트릭
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=admin-api

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
