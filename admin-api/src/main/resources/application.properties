server.port=3002
spring.application.name=admin-api

# SQLite (현재) — RDS 전환 시 교체
spring.datasource.url=jdbc:sqlite:/app/data/botgate.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# HikariCP — SQLite는 단일 연결 필수
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-init-sql=PRAGMA busy_timeout=5000

# 스키마 자동 초기화 (schema.sql) — bot_catalog 등 누락 대응.
# continue-on-error: idempotent INSERT OR IGNORE / CREATE IF NOT EXISTS 라 두 번째 startup 부터 모두 no-op.
# 향후 token-api (Node.js) 가 K8s 에 같이 배포되면 그 쪽이 source of truth — 그땐 Java 쪽 schema.sql 제거.
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql

# OTEL exporter 비활성 (학습 EKS 클러스터엔 otel-collector 없음 — 추후 KPS 연계 시 활성화)
otel.logs.exporter=none
otel.traces.exporter=none

# Actuator + Prometheus 메트릭
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=admin-api

# Swagger / OpenAPI — UI 진입점 /swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
