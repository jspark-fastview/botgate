server.port=3002
spring.application.name=admin-api

# SQLite (현재) — RDS 전환 시 교체
spring.datasource.url=jdbc:sqlite:/app/data/botgate.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# HikariCP — SQLite는 단일 연결 필수
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-init-sql=PRAGMA busy_timeout=5000

# Actuator + Prometheus 메트릭
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=admin-api

# Swagger / OpenAPI — UI 진입점 /swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
