server.port=3002
spring.application.name=admin-api

# ── DataSource ──────────────────────────────────────────────────────
# 기본은 SQLite (EC2 환경). K8s 는 env (SPRING_DATASOURCE_URL 등) 으로 override.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:/app/data/botgate.db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# HikariCP — SQLite 1 / Postgres 10 (env 로 조절)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:1}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-init-sql=${DB_INIT_SQL:PRAGMA busy_timeout=5000}
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ── Schema management ──────────────────────────────────────────────
# SQLite (EC2): token-api 가 schema.js 로 관리. Flyway/schema.sql 둘 다 OFF.
# Postgres (K8s): Flyway 가 V1__init.sql 자동 실행 (FLYWAY_ENABLED=true env 로 켜기).
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.sql.init.mode=${SCHEMA_INIT_MODE:never}
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql

# OTEL exporter — collector 없는 환경 default OFF
otel.logs.exporter=none
otel.traces.exporter=none

# Loki HTTP API (env 로 override) — EC2 비활성, K8s 활성
loki.url=${LOKI_URL:}

# Redis — K8s 환경만 활성. EC2 는 비어있어 자동 비활성.
# 형식: rediss://default:AUTH@host:6379 (TLS) 또는 redis://...
spring.data.redis.url=${SPRING_DATA_REDIS_URL:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
# Redis 미설정 시 spring-data-redis auto-config 비활성 (URL blank → 안전)
guardus.redis.enabled=${GUARDUS_REDIS_ENABLED:false}

# Actuator + Prometheus 메트릭
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=admin-api

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
