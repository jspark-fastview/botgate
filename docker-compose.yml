# 로컬 개발용 docker compose — OpenResty 만 단독 실행.
# prod stack (admin-api/internal-api/frontend) 은 K8s 에서 운영. 로컬에선 K8s API 호출하지 않고
# OpenResty 만 dry-run / Lua 변경 테스트.
#
# token-api (Node.js, deprecated 2026-05) 제거 — internal-api (Spring) 가 대체.
# 로컬에서 internal-api 까지 띄울 일 있으면 별도 추가.
services:
  openresty:
    image: openresty/openresty:1.25.3.2-alpine
    ports:
      - "8081:80"
    environment:
      - GUARDUS_BYPASS_KEY=${GUARDUS_BYPASS_KEY:-}
      - ADMIN_KEY=${ADMIN_KEY:-}
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/conf.d/dev:/etc/nginx/conf.d:ro
      - ./openresty/lua:/etc/nginx/lua:ro
    restart: unless-stopped
